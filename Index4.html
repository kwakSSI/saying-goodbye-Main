            {
                id: "<no-message-id-5094163026730980229@local>",
                name: "삶이란게 그렇습니다...[남택상 그 영원한 사랑의 테마..... Pardonne Moi 외..]|",
                x: 75,

                color: "#4A1EB5",
                info: "삶이란게 그렇습니다...[남택상 그 영원한 사랑의 테마..... Pardonne Moi 외..]|\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<\n\n\n\n\n\n\n\n그리움 때문에 삶엔 향기가 있지요....!\n\n바람이 부는 것은\n누군가를 갈망하고 있기 때문입니다.\n\n내가 너에게,\n혹은 네가 나에게 보내는 바람엔\n향기가 묻어 있습니다.\n\n삶이란게 그렇습니다.!\n기쁨보단 슬픔이 더 많지요.\n또한 사랑이란 것도 그렇습니다.\n\n같은 양이라 할지라도\n기쁨보단 슬픔을 더욱 깊게 느끼지요.\n\n뿐만 아니라 기쁨은 순간적이지만\n슬픔은 그렇지 않습니다.\n\n슬픔의 여운은 기쁨의 그것보다\n훨씬 오래인 것입니다.\n\n왜겠습니까?\n아무리 생각해도\n전 그 해답을 알 수가 없었습니다.\n\n그러나 전 이제는\n그 까닭을 알 수 있게 되었지요\n\n비바람을 거친 나무가 더욱 의연하듯\n사람도 슬픔 속에서\n더욱 단련되어지는 것이라고 말입니다.\n\n사랑이라는 것도 그렇습니다.\n헤세가 얘기했듯이\n\n사랑이라는 것은 우리를 행복하게\n하기 위해서 있는 것이 아니었습니다.\n\n 우리가 고뇌와 인내에서\n얼마만큼 견딜 수 있는가를\n보이기 위해서 있는 것이었습니다.\n\n\"그것이 내 삶의 한 부분이었구나!\"하는\n사실을 깨달을 수가 있었습니다.\n\n그러다보니 점차 재밌다는 생각이 들더군요.\n글쎄...재밌다니?\n눈살을 찌푸릴 분도 있겠지만\n\n삶이란, 전 한번\n살아 볼만하다고 생각 했습니다.\n\n언제나 극한 상황이었고\n언제나 최악이었지만 삶이란\n어차피 곡예라고 느꼈기 때문입니다.\n\n 때문에 고통스러운 삶을 살아가는 사람은\n그만큼 진지한 삶을 살아가고 있는겁니다.\n\n그리하여 그는 쓸쓸하거나\n외롭지 않을 수가 있습니다\n\n왜냐하면 늘 혼자임을 알고 있었기에\n모두들 스치고 지나간 뒤에도...\n이 글을 읽는 당신도 그러길 바랍니다.\n\n\n- 글:이 정하  -\n\n\n♬남택상의 주옥 같은  영원한 사랑의 테마\n\n\n\n영화 대부 - 남택상\n\n\n\nTornero - 남택상\n\n남택상 - caravan sary 대상의 행렬\n\nmelancholy smile(우울한 미소) -남택상\n\nJ' Ai Me(그대를 사랑해) - 남택상\n\n슬픈 로라-남택상\n\nKleine Traummusik (작은 소야곡)-남택상\n\nModerato Cantabile (빗속의 해후)- 남택상\n\nPardonne Moi (용서하세요..)\n\nMoonlight Serenade-남택상\n\nlove player - 남택상\n\nAce Of Sorrow - 남택상\n\nSympathy (연민의 정) - 남택상\n\nMoonlight Flower (달맞이꽃) - 남택상\n\nLa Ragazza Di Bube (부베의 연인)-남택상\n\nWho Are We (산타마리아의 기도) - 남택상\n\nModer Ato Cantabile-남택상\n\nLa Tristesse De Amour-남택상\n\nJ'Ai Peur (사랑의 두려움) - 남택상\n\n\n\n\n\n\n\n\n\n\n♡Namaste♡\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n				음악을 사랑하는\n\n				http://cafe.daum.net/loveoniy\n\n\n\n\n\n\n\n\n\n\n\n\n					카페 가입승인제 기능 오픈\n					에디터 파일첨부 용량이 늘어났습니다.\n\n\n\n\n					카페 정모 기념품을 지원합니다!\n					신규 카페게임 '비바 삼국지' 오픈"

            {
                id: "<no-message-id-5752449096546532844@local>",
                name: "우리 함께 가는 길에 . . . 꿈같은 여름날의 바이올린",
                x: 35,
                y: 56,
                color: "#99138E",
                info: "우리 함께 가는 길에 . . . 꿈같은 여름날의 바이올린\n꿈같은 여름날의 바이올린\n\원추리 혹은 忘憂草.........\n\n\n\n\n\n\n\n\n울, 황톳 빛에서 온 듯도 한\n\n\n주황빛 속에 여름은 환하다\n\n\n\n\n\n어디 가도 藥 되는 사람같이\n\n\n빛과 효능을 지닌 고마운 너\n\n\n\n\n\n그런 사람을 만나고 싶은 날\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n 우리 함께 가는 길에...용혜원\n\n\n그대를 만남이\n그대를 찾음이\n나에게는 축복입니다\n\n\n\n\n\n\n\n\n\n\n우리 함께 가는 길에\n동행할 수 있음이\n나에게는 행복이기에\n\n\n\n\n\n4\n\n\n\n\n밤하늘에 떠 오르는\n별 하나 하나가\n한 떨기 꽃이 될 수만 있다면\n그대 가슴에 안겨 주고만 싶습니다\n\n\n\n\n\n\n\n\n사랑 때문에\n눈물을 흘리고 싶지 않습니다\n\n언제나 그대에게 만은\n별이 되어 빛나고 싶습니다\n꽃이 되어 피어나고 싶습니다\n\n\n\n\n\n\n\n\n\n영상 이미지 :dadapoem\n\n\n\n\n\n\n\n꿈같은 여름날의 바이올린\n\n01. Serenade To Spring - Lovland Rolf (10월의 어느 멋진 날에)\n02. Variations on the Cannon - Pachelbel (영화 ‘클래식’ost)\n03. Les larmes du Jacqueline - J. Offenbach (쟈클린의 눈물)\n04. Je Te Veux - Erik Satie (드라마 ‘노다메 칸타빌레’ 삽입곡)\n05. La Romanesca - Fernando Sor (드라마 ‘꽃보다 남자’ 삽입곡)\n\n06. Memory of Love - Yuhki Kuramoto (드라마 ‘주몽’ ost)\n07. 인생의 회전목마 - Joe Hisaishi (애니메이션 ‘하울의 움직이는 성’ ost)\n08. L'inverno - Vivaldi, Antonio (사계 중 겨울 2악장 영화 ‘사랑하고 싶은 그녀’)\n09. Nella Fantasia - Ennio Morricone / Chiara Ferrau (영화 ‘미션’ ost)\n10. Siciliano - J. S. Bach (BWV1031\" 플릇소나타No.2 Eb장조 중 2악장)\n\n11. Nocturne Opus 9 No.2 - Chopin (야상곡)\n12. Etude Op. 10-3 - Chopin (이별곡 영화 ‘제노바’ ost)\n13. Romance - Yuhki Kuramoto (영화 ‘달콤한 인생’ ost)\n14. 그 남자 - 원태연/전해성 (드라마 ‘시크릿 가든’ ost)\n15. 죽어도 사랑해 - 최갑원 / 김도훈,이현승 (드라마 ‘대물’ ost)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n				음악을 사랑하는\n\n				http://cafe.daum.net/loveoniy\n\n\n\n\n\n\n\n\n\n\n\n\n					카페 가입승인제 기능 오픈\n					에디터 파일첨부 용량이 늘어났습니다.\n\n\n\n\n					카페 정모 기념품을 지원합니다!\n					신규 카페게임 '비바 삼국지' 오픈"

            {
                id: "<no-message-id-6603658237887295019@local>",
                name: "동경속낙원의 마지막, 그리고 사서함 73호, 바람이 머문 낙원 의 첫 시작 / 이벤트 /",
                x: 11,
                y: 86,
                color: "#080EB7",
                info: "=?EUC-KR?B?w6Ugw+KwoyC/ucGkwM8gud/HpS8=?=\nX-DAUM-CAFE-ID: cafe447;16Ea5;사서함 73호, 바람이 머문 낙원 운영자\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n			동경속낙원의 마지막, 그리고 사서함 73호, 바람이 머문 낙원 의 첫 시작 / 이벤트 / 책 출간 예정일 발표/\n\n\n\n\n\n\n이벤트 관련 메일만 돌리려 하다가 카페 이름을 바꿨다는 소식을 전해드리지 않았네요.\n\n\n\n\n\n조금은 늦었지만 7월 3일, 이노님께서 동경바라기라는 닉네임을 내려놓았듯이, 팬카페 역시 동경속낙원이라는 정들어버린 이름을 내려놓고 사서함 73호, 바람이 머문 낙원으로 새 시작을 하게 되었습니다.\n\n\n이제는 전체메일, 쪽지, 공지에서 사라지게 될 동경속낙원, 동경바라기라는 닉네임의 마지막 메일이자\n\n\n앞으로 함께하게 될 INO라는 닉네임과 사서함 73호, 바람이 머문 낙원의 새 시작과 함께 6주년 이벤트를 시작합니다.\n\n\n카페에 들려주셔서 많은 축하와 참여 부탁드립니다.\n\n\n\n\n\n\n\n\n-  사서함 73호, 바람이 머문 낙원 / 공모전 당첨자 : 시계태엽님.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n아직까지는 동경속낙원이라는 이름이 손에 익어 사서함73호, 바람이 머문 낙원이 낯설은 때, 벌써 6주년이 다가왔습니다.\n\n\n정확하게 말씀드리면 이미 6주년은 7월 3일날 지나게 되었지만 올해부터는 시험기간으로 인해 참여를 못하시는 학생회원님들을\n\n\n위해 날짜를 미뤄서 열게 되었습니다. 2006년 카페가 만들어지고 벌써 6주년, 햇수로는 7년이 지났습니다. 긴 시간동안 카페, 그리고 이노(동경바라기)님과 함께 해주신 분들께 감사하다는 말씀 드리면서 앞으로도 더 긴 시간동안 함께해주셨으면 하는 바람을 담아 이벤트를 열고자 합니다.\n\n\n\n\n\n기간 : 7월 14일(토)~ 7월 22일(일) 오후 11시 마감\n\n\n참여자격 : 정회원~ 지기 < 운영자 제외 >\n\n\n상품 : 등급업(제한없음)/ 로맨틱디자인 5세트 / 한 게시판에만 걸려있는 기프티콘 약 20장/ 베스킨라벤스 싱글 기프티콘 2장/\n\n\n주의점 : 상업, 홍보, 성인, 욕설, 비난 글 올릴시 무통보 삭제와 당첨무효와 그에 따른 제재처리/ 중복참여여부는 각게시판에/\n\n\n\n\n\n\n\n\n* 이벤트를 설명해드리기 전 7월 3일날 열었던 게릴라 이벤트 포인트에 대하여 설명드립니다.\n\n\n\n\n\n: 6주년 이벤트는 다름아닌 포인트제로 진행할 예정입니다. 등업이벤트를 제외한 이벤트는 총 4개이며 각 게시판에서 1등 당첨자 (제본당첨자)를 제외한 순위부터\n\n\n\n\n\n1등 50포인트\n\n\n2등 30포인트\n\n\n3등 10포인트\n\n\n순위권 5포인트\n\n\n\n\n\n씩 드릴 예정입니다.  총 포인트가 가장 높은 한분께 로맨틱디자인 한세트를 상품으로 드립니다. 해서 게릴라 이벤트에서 포인트를 받으신 분들은 10포인트를 먼저 안고 시작하시기 때문에 다른 분들보다 유리한 위치해서 시작하시게 되실겁니다.\n\n\n\n\n\n* 포인트가 높으면 높을수록 유리하니 모든 이벤트에 참여하시는 분들이 조금이라도 포인트가 더 쌓일 확률이 높습니다.\n\n\n\n\n\n\n\n\n이벤트 설명\n\n\n\n\n\n- 모든게복불복 게시판 (등업이벤트)+ 베스킨라벤스 싱글 기프티콘 1장\n\n\n: 해당 게시판 안에 여러개의 게시글이 있을 겁니다. 각각의 게시글은 모두 복불복 성향을 띄우고 있으며 게시글을 읽고 그에 알맞게 댓글을 달아주시면 복불복으로 게시글마다 약 10명씩 당첨자를 뽑을 것이며, 뽑히신 분들께 모두 등급을 올려드립니다.\n\n\n\n\n\n- 꽃의낙인애독자\n\n\n: 이노님과 6주년을 떠나 꽃의낙인을 보시는 분들께 제가 평소 연재가 더뎌 드리는 상품이 걸린 이벤트입니다 해당 이벤트에 걸린 상품은 모두 제 개인적인 사비에서 드릴 예정이며, 해당 게시판에는 이노님의 책이 상품으로 걸려있지 않습니다.\n\n\n\n\n\n제가 사정상 컴퓨터를 하루에 할 수 있는 시간이 얼마되지 않는 와중에 현재 컴퓨터가 가능한 시간에는 모두 이노님의 보보 모니터링을 세세하게 봐드리고 있는 상황입니다. 아마 당분간 그러한 상황이 반복되게 될텐데 꽃의낙인을 봐주시는 분들께 해드릴게 뭐 없을까 하고 고민하다가 최대한 많은 분들께 기다려주셔서 감사하다는 마음을 전하고자 이벤트를 열게되었습니다. 마침 여름이기도 하고 길거리를 걸어다니시다가 더우실때 하나씩 드시라고 1등 베스킨라벤스 싱글 기프티콘 1장/ 그외 순위권 아이스크림 기프티콘 약 20장 을 준비했습니다. 평소 꽃의낙인을 많이 기다리고있었다.  연재가 늦어지는게 조금 화가나기도하고(?) 작가가 원망스러웠다(?) 해서 그 마음에 대한 보상을 꼭 받고싶다 하시는 분들은 해당 이벤트에 참여해주세요.\n\n\n\n\n\n- 당근과채찍\n\n\n: 작가님께서도 동경바라기란 닉네임을 내려놓고 이노라는 닉네임으로 새 시작을 했듯, 카페 역시 동경속낙원이란 이름을 내려놓고 사서함 73호, 바람이 머문 낙원으로 새 시작을 하게 되었습니다. 해서 카페를 위한 이벤트를 준비했습니다. 카페를 위한 당근과 채찍을 주시면 됩니다. 자세한 사항은 해당 게시판 공지사항을 보시면 됩니다. 상품은 로맨틱 디자인 2세트 / 등급업입니다.\n\n\n\n\n\n- 보스사로잡기\n\n\n: 보스 사로잡기라는 이름으로 열게된 제 3회 낙원 사진전입니다. 보스의 품격에 관한 사소한 보고서를 보시는 분들은 아시다시피 풍경 사진이 여러장 등장하시는걸 아실겁니다. 해당 이벤트는 한마디로 앞으로 보스 연재에 쓰일 사진 공모전입니다. 풍경사진만\n\n\n가능합니다. (풍경 사진안에 작게 찍힌 사람사진정도는 괜찮습니다. 말 그대로 사람을 메인으로 찍은 사진이 아니라 풍경을 메인으로 찍은 사진을 올려주시면 됩니다.) 저작권에 걸리지 않은 이왕이면 본인이 직접 찍거나 주변 지인, 친구, 가족분들이 찍은 사진을 올려주세요. 해당 이벤트에서 뽑힌 사진 몇장은 보.보 소설 안에 쓰일 예정입니다. 상품은 로맨틱 디자인 2세트/등급업\n\n\n\n\n\n- I (k)no(w)\n\n\n: 이노님에 대한 질문을 여러개 제시할 예정입니다. 그 질문에 대해 답변을 적어주시면 됩니다. 정확한 답변? 모두 맞추시는 분들 중에서도 한분을 뽑아 상품을 드리지만, 그럴듯한데 재미있고, 독창적인 답변을 적어주시는 분들도 뽑을 예정입니다. 유쾌한 답변 기다리겠습니다.  (상품 포인트 50/30/10/)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n이벤트설명을 보셔도 의문점이 생기시는 분들은 각각 이벤트 게시판 공지를 봐주세요.\n\n\n공지를 보시고도 이해가 가지 않은 점이 있으시다면 질문건의방에 글 남겨주세요 :)\n\n\n\n\n\n사서함 73호, 바람이 머문 낙원으로 여는 첫 이벤트입니다.\n\n\n많은 참여와 관심 부탁드립니다.\n\n\n\n\n\n\n\n\n\n\n\n추가 ★ 악어의 눈물과 투하트는 8월 초~중순 사이에 전자책으로 발간될 예정입니다.\n\n\n자세한 사항은 8월 초~중순에 책이 발간된 뒤 다시 한번 공지 돌리겠습니다.\n\n\n\n\n\n\n\n\n\n\n\n이젠 동경속낙원이 아닌\n\n\n사서함 73호, 바람이 머문 낙원안에서 언제나 행복한 하루가 되시길.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n				사서함 73호, 바람이 머문 낙원\n\n				http://cafe.daum.net/ehdrudqkfkrl\n\n\n\n\n\n\n\n\n\n\n\n\n					카페 가입승인제 기능 오픈\n					에디터 파일첨부 용량이 늘어났습니다.\n\n\n\n\n					카페 정모 기념품을 지원합니다!\n					신규 카페게임 '비바 삼국지' 오픈"

                x: 92,

                info: "2012.08.01\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n한국 인터넷 진흥원에서 제공하는 개인정보 유출\n\n예방을 위한 웹 체크 프로그램을 사용하여 웹페이지의\n\n악성코드 은닉 여부를 확인 해 주세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n안전한 비밀번호 관리를 위해서\n\n비밀번호는 반드시 정기적으로 변경을 해주시고\n\n다른 사람이 비밀번호를 알 수 없도록 철저히 관리 해 주세요.\n\n\n\n\n\n\n\n\n\n\n\n\n지난 7월, 네이트 로그인 내역을 확인하시려면\n\n로그인 기록 보기를 클릭 해 주세요.\n\n로그인 성공/실패 여부, 로그인 한 시간 및 접속한 PC 기록 제공\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n메신저 피싱 피해는\n\n경찰청 사이버테러대응센터에 즉시 신고 해 주세요.\n\n경찰청 사이버테러대응센터\n보이스 피싱 피해는\n\n경찰청 신고 민원 포털에 신고 해 주세요.\n\n경찰청 신고 민원 포털\n\n\n스팸메일에 의한 피해는\n\n불법스팸대응센터에 즉시 신고 해 주세요.\n\n불법스팸대응센터\n악성코드에 의한 피해는\n\n인터넷 침해대응센터에 즉시 신고 해 주세요.\n\n인터넷 침해대응 센터\n\n\n\n\n\n\n\n\n\n\n사생활 보호 설정은 커뮤니케이션 센터에서 스팸클린설정을 통해 광고성 메일 및 피싱메일 수&#49906; 사전에 방지하세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n더보기\n\n\n\n\n\n\n\n\n\n\n\n본 메일은 2012년 7월 30일자 기준으로 네이트에 가입되어 있는 모든 회원들을 대상으로 발송되었습니다.\n\n회원님께서 수신가능 메일주소로 설정한 e-mail 주소로 발송된 것으로 발신전용이며 관련 문의는\n\n네이트/싸이월드 고객센터를 이용해 주시기 바랍니다.\n\n\n수신거부를 원하시면 우측의 버튼을 클릭하여 수신거부 설정을 해주세요. 수신거부\n\n\n\n\n\n\n\n\n상호명 : SK Communications(주) | 사업자등록번호 : 220-81-37906 | 대표자 : 이주식\n\n소재지 : 서울시 서대문구 미근동 257번지 임광빌딩 신관 | 네이트/싸이월드 고객센터\n\n문의전화 : 1599-7983   Fax : 02-417-8986\n\nCopyright &copy; SK Communications All rights reserved."

            {
                id: "<201210131114.g9DBEhb3Y287567680@rmail-353.daum.net>",
                name: "[네이트]아이들의 안전한 인터넷 생활, 미리 확인하세요.",
                x: 37,
                y: 42,
                color: "#63967E",
                info: "2012.10.10\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n한국 인터넷 진흥원에서 제공하는 개인정보 유출\n\n예방을 위한 웹 체크 프로그램을 사용하여 웹페이지의\n\n악성코드 은닉 여부를 확인 해 주세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n자동로그인 설정해 둔 스마트폰 분실했다면?\n\n로그인 비밀번호를 변경하시면, 분실하신 스마트폰에서도\n\n자동로그인 기능이 해제되니, 분실 즉시 변경하세요.\n\n\n\n\n\n\n\n\n\n\n\n\n지난 9월, 네이트 로그인 내역을 확인하시려면\n\n로그인 기록 보기를 클릭 해 주세요.\n\n로그인 성공/실패 여부, 로그인 한 시간 및 접속한 PC 기록 제공\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n메신저 피싱 피해는\n\n경찰청 사이버테러대응센터에 즉시 신고 해 주세요.\n\n경찰청 사이버테러대응센터\n보이스 피싱 피해는\n\n경찰청 신고 민원 포털에 신고 해 주세요.\n\n경찰청 신고 민원 포털\n\n\n스팸메일에 의한 피해는\n\n불법스팸대응센터에 즉시 신고 해 주세요.\n\n불법스팸대응센터\n악성코드에 의한 피해는\n\n인터넷 침해대응센터에 즉시 신고 해 주세요.\n\n인터넷 침해대응 센터\n\n\n\n\n\n\n\n\n\n\n사생활 보호 설정은 커뮤니케이션 센터에서 스팸클린설정을 통해 광고성 메일 및 피싱메일 수&#49906; 사전에 방지하세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n더보기\n\n\n\n\n\n\n\n\n\n\n\n본 메일은 2012년 10월 9일자 기준으로 네이트에 가입되어 있는 모든 회원들을 대상으로 발송되었습니다.\n\n회원님께서 수신가능 메일주소로 설정한 e-mail 주소로 발송된 것으로 발신전용이며 관련 문의는\n\n네이트/싸이월드 고객센터를 이용해 주시기 바랍니다.\n\n\n수신거부를 원하시면 우측의 버튼을 클릭하여 수신거부 설정을 해주세요. 수신거부\n\n\n\n\n\n\n\n\n상호명 : SK Communications(주) | 사업자등록번호 : 220-81-37906 | 대표자 : 이주식\n\n소재지 : 서울시 서대문구 미근동 257번지 임광빌딩 신관 | 네이트/싸이월드 고객센터\n\n문의전화 : 1599-7983   Fax : 02-417-8986\n\nCopyright &copy; SK Communications All rights reserved."

            {
                id: "<201211081349.gA8DnLw5T124225810@rmail-306.daum.net>",
                name: "[네이트]내 PC가 좀비 PC? 지금 Webcheck로 바로 확인하세요.",
                x: 69,
                y: 27,
                color: "#D66B94",
                info: "2012.11.05\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n한국 인터넷 진흥원에서 제공하는 개인정보 유출\n\n예방을 위한 웹 체크 프로그램을 사용하여 웹페이지의\n\n악성코드 은닉 여부를 확인 해 주세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n자동로그인 설정해 둔 스마트폰 분실했다면?\n\n로그인 비밀번호를 변경하시면, 분실하신 스마트폰에서도\n\n자동로그인 기능이 해제되니, 분실 즉시 변경하세요.\n\n\n\n\n\n\n\n\n\n\n\n\n지난 10월, 네이트 로그인 내역을 확인하시려면\n\n로그인 기록 보기를 클릭 해 주세요.\n\n로그인 성공/실패 여부, 로그인 한 시간 및 접속한 PC 기록 제공\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n메신저 피싱 피해는\n\n경찰청 사이버테러대응센터에 즉시 신고 해 주세요.\n\n경찰청 사이버테러대응센터\n보이스 피싱 피해는\n\n경찰청 신고 민원 포털에 신고 해 주세요.\n\n경찰청 신고 민원 포털\n\n\n스팸메일에 의한 피해는\n\n불법스팸대응센터에 즉시 신고 해 주세요.\n\n불법스팸대응센터\n악성코드에 의한 피해는\n\n인터넷 침해대응센터에 즉시 신고 해 주세요.\n\n인터넷 침해대응 센터\n\n\n\n\n\n\n\n\n\n\n사생활 보호 설정은 커뮤니케이션 센터에서 스팸클린설정을 통해 광고성 메일 및 피싱메일 수&#49906; 사전에 방지하세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n더보기\n\n\n\n\n\n\n\n\n\n\n\n본 메일은 2012년 11월 5일자 기준으로 네이트에 가입되어 있는 모든 회원들을 대상으로 발송되었습니다.\n\n회원님께서 수신가능 메일주소로 설정한 e-mail 주소로 발송된 것으로 발신전용이며 관련 문의는\n\n네이트/싸이월드 고객센터를 이용해 주시기 바랍니다.\n\n\n수신거부를 원하시면 우측의 버튼을 클릭하여 수신거부 설정을 해주세요. 수신거부\n\n\n\n\n\n\n\n\n상호명 : SK Communications(주) | 사업자등록번호 : 220-81-37906 | 대표자 : 이주식\n\n소재지 : 서울시 서대문구 미근동 257번지 임광빌딩 신관 | 네이트/싸이월드 고객센터\n\n문의전화 : 1599-7983   Fax : 02-417-8986\n\nCopyright &copy; SK Communications All rights reserved."

            {
                id: "<no-message-id-6377536544664999645@local>",
                name: "한국인이 가장 애청하는 클래식 - 60곡",
                x: 26,
                y: 62,
                color: "#B9428C",
                info: "한국인이 가장 애청하는 클래식 - 60곡\n				 		 var articleno = \"16430484\";\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n 1.메뉴엣( Menuett aus dem Streichquintett E-dur) / 보케리니(boccherini)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n18세기 이탈리아의 고전파 작곡가로 활약한 음악가 보케르니의 작품.\n\n\n프랑스 궁중에서 쓰였던 가볍고 우아한 4분의 3박자 의 춤곡으로,\n\n\n17세기경 프랑스의 농촌에서 무도곡으로 시작되어\n\n\n급기야 궁중의 화려한 무도회의 음악으로 각광받은 작품.\n\n\n<보케르니의 미뉴엣>은 피치카토 반주를 타고 연주되는\n\n\n우아하고 품위 있는 대표적인 미뉴엣이다.\n\n\n\n\n\n\n\n\n\n\n\n 2. 경기병 서곡 (Light Cavalry Overture) / 주페(Suppe)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n희가극 중 특히 서곡의 작곡가로 유명한 주페는 오스트리아 빈 스타일의\n\n\n우아한 리듬과 맑은 선율의 작품을 남긴 음악가이다.\n\n\n이 작품은 빈의 시인 코스타의 대본에 의한 군대이야기로\n\n\n차르다슈 등 헝가리 무곡을 사용해서 만든 1866년 희가극이다.\n\n\n경기병들의 화려한 생활을 묘사하고 있으며,\n\n\n오페렛타에 나오는 주선율 5개를 사용하여 구성하고 있는데\n\n\n용감한 경기병을 암시하는 금관악기의 팡파르로 시작된\n\n\n경쾌한 행진은 듣는 이의 마음을 밝게 해준다.\n\n\n\n\n\n 3.조곡 동물의 사육제 中 “백조” / 생상(Saint Saens)\n(The Carnival Of Animal, Mov 13 ''The Swan'')\n\n\n\n\n\n\n프랑스 음악부흥의 선구자인 <생상>의 대표적인 작품.\n\n\n1886년 샤를느 르보크가 주최하는 사육제의 음악회에서\n\n\n청중들을 놀라게 해 주려고 작곡한 작품. 모두 14곡으로 된 이 모음곡에는\n\n\n당시의 사람들이 알고있는 명곡들을 삽입해 흥미를 주고 있으며,\n\n\n이 중 특히 제13곡의 <백조>는 독주곡으로 편곡되어\n\n\n하프의 아르페지오를 타고 흐르는 첼로의 아름다운 멜로디는 호수의 여왕 백조를 방불케한다.\n\n\n\n\n\n\n\n\n\n\n\n 4.아름답고 푸른 다뉴브강(The Beautiful Blue Danube Waltz, op 314) / Johann Strauss\n\n\n\n\n\n\n\n\n비엔나적 기질의 달콤한 선율의 많은 요한 스트라우스 왈츠곡 중에서도\n\n\n가장 아름다운 걸작, 1867년 궁중 무도회 악장으로 재임하고 있을 무렵에 완성되었다.\n\n\n낙천적이고 온화하고 어떤 역경속에서도 행복을 발견해서\n\n\n즐기려고 하는 빈 사람들의 기질을 푸른 다뉴브강의 아름다운 풍경으로 하여 잘 묘사되어 있다.\n\n\n\n\n\n\n\n\n 5. 엘리제를 위하여(Fur Elise) / 베토벤(Beethoven)\n\n\n\n\n\n\n\n\n이 곡은 멜로디가 경쾌하고 비교적 연주가 쉬워,\n\n\n특히 어린이들이 즐겨 연주하는 깔끔하고 사랑스런 피아노 소품이다.\n\n\n엘리제가 어떤 여성인지는 밝혀지지 않고 있는데,\n\n\n베토벤이 그 초고에“테레제의 추억을 위해,\n\n\n1810년 4월27일, LV,Beethoven''''이라 쓴 것으로 보아,\n\n\n당시 베토벤이 연정을 품고 있던 17살의 여성인 테레제 마르파티가 아닐까하고 추정되며,\n\n\n아름다운 여성에게 바치기 위한 곡이었던 만큼 열정과 재치가 뛰어난 작품이다.\n\n\n\n\n\n\n\n\n 6. 핀란디아 / 시벨리우스(Sibelius)\n(Symphonic poem 'Finlandia' Op.26 No.7)\n\n\n\n\n\n\n\n\n조국에 대한 진지한 사랑이 찬란하게 빛나는 이 곡은\n\n\n시벨리우스의 많은 작품중에서도 애국심에 기반을 둔 자연주의적인 작품이다.\n\n\n조국 핀란드는 오랜 세월을 러시아의 압정하에서 시달렸다.\n\n\n따라서 핀란드의 아름다운 자연을 찬양한 이 교향시야말로\n\n\n어려운 환경 속에서 시름하고 있던 국민들에게\n\n\n애국심을 다시 한번 생각하게 하는 크나큰 역할을 한다.\n\n\n특히 이 곡 후반부의 애조띤 민요조의 합창가락은\n\n\n시벨리우스 자신이 직접 쓴 것으로 그의 혼이 담긴 작품이라 할 수 있다.\n\n\n\n\n\n\n\n\n\n\n\n 7. 월광소나타 / 베토벤(Beethoven)\n(Piano Sonata No.14 in c# 'Moonlight', op.27 #2 - 01 - Adagio)\n\n\n\n\n\n\n\n\n피아노 소나타 제14번인 이 곡은 환상곡풍의 소나타이며\n\n\n어느날 밝은 밤 눈 먼 소녀를 위하여 즉흥으로\n\n\n연주된 월광 소나타였다는 로맨틱한 이야기가 널리 퍼져 있다.\n\n\n\n\n\n\n\n\n\n\n\n 8. 터어키행진곡 / 모차르트(Mozart)\n(Turkish March)\n\n\n\n\n\n\n\n\n피아노 소나타 제11번 가장조 D331의 별칭이다.이 곡은\n\n\n제3악장이 터키 스타일로 쓰여져 있으며,\n\n\n원곡에는 알라 투르카(터기풍)라고 쓰여져 있는데\n\n\n당시 터키풍의 음악이 애호 되었기 때문에 이렇게 표시된 것 같다.\n\n\n\n\n\n\n\n\n 9. 교향곡 9번 e단조 Op.95 '신세계에서' 中 2악장:라르고 / 드보르작(Dvorak)\n\n\n (Symphony No. 9 in E minor, Op. 95 Largo ''From The New World'' 2st Mov)\n\n\n\n\n\n\n\n\n신세계 중에서 2 악장<꿈속의 고향>이라는 가사로 불리어지는 작품으로,\n\n\n흑인영가와 인디언 민요를 토대로 하여 작곡한 것이다.\n\n\n교향곡에서는 Largo 속도 잉글릿시 호른으로 연주되며,\n\n\n고향을 떠나 사는 사람들에게는 적지 않은 향수를 느끼게 했을 것이다.\n\n\n이 곡은 9개의 교향곡 중 마지막 작품으로\n\n\n출판사 측의 실수로 <제5번>으로 알려졌다가<제9번>으로 정정되었다.\n\n\n\n\n\n\n\n\n\n\n\n 10. 헝가리무곡 제5번 / 브라암스(BRAHMS)\n(Hungarian Dance No.5)\n\n\n\n\n\n\n\n\n헝가리의 집시 음악을 피아노용으로 편곡한 것으로\n\n\n4권 21편의 피아노 곡으로 되어 있다.\n\n\n제1.2권은 1869년,제 3.4권은 1880년에 출반되었으며,\n\n\n특히 5번과 6번은 널리 알려져 있다.\n\n\n\n\n\n\n\n\n 11. 4계중 “봄”1악장 / 비발디(Vivaldi)\n(The Four Season 'Spring' 1st Mov.)\n\n\n\n\n\n\n\n\n사계 중 봄 1악장은 기다렸던 봄이 와서 기뻐하는 사람들과\n\n\n새들의 모양이 밝게 묘사되어 있는 작품. 악보에는 다음과 같은 소네트가 쓰여 있다.\n\n\n<봄이 왔다.새는 기쁜 노래로써 봄 인사를 한다.\n\n\n샘은 산들바람에 상냥히 속삭이면서 넘쳐흐르기 시작한다.\n\n\n그러자 하늘은 어두워 지고 천둥과 번개가 봄을 알린다. 폭풍우가 지난 뒤,\n\n\n새들은 다시 아름다운 노래를 부른다>리토르넬로 형식인데 묘사 음으로 훌륭하다.\n\n\n\n\n\n\n\n\n\n\n\n 12. 교향곡 제6번 “전원”제2악장 / 베토벤(Beethoven)\n(Symphony No.6 in F Major, Op.68 'Pastoral' 2nd)\n\n\n\n\n\n\n\n\n교향곡 제 6번<전원>2악장 청각장애가 극심한 39세때의 작품.\n\n\n인간과의 대화가 어려울 수록 자연에 대한 사랑은 더욱 친밀해지는 것,\n\n\n5개의 각 악장마다 표제를 붙이고 있으나, 풍경묘사를 넘어서 대자연의 숭고함을 공감하게 한다.\n\n\n제2악장 “시냇가의 정경” 흐르는 시냇물의 속삭임을 연상케하는 반주 위에\n\n\n바이올린이 테마를 제시한다. 새들의 지저귐이 전원의 정경을 한껏 묘사하고 있는데\n\n\n제 2테마는 햇살 가득한 들의 정취를 그린다. 재현부에서는\n\n\n밤꾀꼬리 소리(플루트), 메추리소리(오보에), 뻐꾸기소리(클라리넷)가 묘사되고 있다.\n\n\n\n\n\n\n\n\n 13. 교향곡 제5번 c단조 작품67“운명” 中 1악장 / 베토벤(Beethoven)\n(Symphony No.5 c minor Op.67 'Schicksall' 1Mov)\n\n\n\n\n\n\n\n\n1808년에 완성한 이 곡은 제1악장 첫머리에 나오는 동기를\n\n\n‘운명은 이렇게 문을 두드린다’라고 베토벤이 얘기한데서부터 운명이라는 이름이 붙여졌다.\n\n\n불과 30분에 불과한 곡이지만 착상에서 완성까지 무려 5년이 걸린 대작으로\n\n\n역경을 딛고 마침내 승리자가 되는 신념이 담겨 있기도 하다.\n\n\n1808년 빈에서 초연 되었으며 로프코비츠 후작과 竄寧曹좃뵀?백작에게 헌정 되었다.\n\n\n\n\n\n\n\n\n\n\n\n 14. 할렐루야 (Hallelujah) / 헨델(handel)\n\n\n\n\n\n\n\n\n오라토리오 “메시아” 중에 나오는 이 할렐루야는\n\n\n종교적 바탕으로 힘차고 장엄함이 특색이다. 1742년 런던 초연에 참석한 영국의 왕 조지2세가\n\n\n‘할렐루야 코러스’ 부분에서 감격한 나머지 기립했다는 이야기가 있는데\n\n\n오늘날에도 그 부분에서는 전원이 기립하는 관습이 내려오고 있다.\n\n\n\n\n\n\n\n\n\n\n\n 15. 소녀의 기도 / 바다르체브스카(T.Badarzewska)\n(The Malden's Prayer)\n\n\n\n\n\n\n\n\n\n\n\n23세의 짧은 생애를 마친 작곡가가 남긴 33곡의 소품 중 우리가 들을수 있는 곡은 이 한곡뿐이다.\n\n\n\n\n\n\n\n\n\n\n\n 16. 한여름밤 꿈 中“결혼행진곡”/ 멘델스죤(Mendelssohn)\n(Wedding March)\n\n\n\n\n\n\n\n\n“한 여름밤의 꿈'''' 중 결혼행진곡,\n\n\nHappy End로 끝난다는 셰익스피어의 곡 <한 여름밤의 꿈>과 같은 과거 추억의 한 토막,\n\n\n흔히 결혼식장에서 바그너의 곡과 같이 들을 수있다.\n\n\n\n\n\n\n\n\n 17. 백조의 호수 中 제2막 제10곡 정경-모테라도 / 차이코프스키(Tchaikovsky)\n\n\n(The Swan Lake, Op.20 Act 2. No 10 Scene-Moderato)\n\n\n\n\n\n\n\n\n차이코프스키가 쓴 발레 음악은\n\n\n<백조의 호수>,<잠자는 숲속의 미녀>,<호도 까기 인형> 등 3곡이 있는데\n\n\n이 중 맨 처음 작곡했던 <백조의 호수>가 가장 유명하다. 1877년에 작곡하여\n\n\n같은 해 모스크바에서 초연 되었는데 그 당시는 별로 좋은 평을 얻어내지 못했지만\n\n\n그 후 몇 번의 수정을 거쳐 1895년 페레르스부르크 상연 때부터 알려지기 시작했다.\n\n\n전4막에 36곡으로 되어 있는데 그 중 백조의 호수 中 “정경“은\n\n\n전막을 통일하는 중요한 주제(라이트 모티브)구실을 하는 곡이며\n\n\n하프에 곁들여서 흘러나오는 오보에의 애절한 멜로디가 인상적인 작품이다.\n\n\n\n\n\n\n\n\n 18.꿈(트로이 메라이) / 슈만(Schumann)\n(Traumerei)\n\n\n\n\n\n\n\n\n슈만은 즉흥적인 小曲(소곡)을 여러 개 모아\n\n\n커다란 조곡으로 꾸미는 일을 많이 하였는데 이 <트로이메라이>의 귀여운 소품도\n\n\n<어린이 정경>(작품15)이라는 곡집에 포함되어 있다. 이 작품은 1838년에 완성되었고,\n\n\n하나의 줄거리를 따라 일관된 주제에 의해 작곡된 것이 아니라,\n\n\n천진난만한 어린이 세계를 단편적인 표제를 붙여 모은 곡이다.\n\n\n13곡에는 모두 제목이 붙어 있는데 제목만 보아도\n\n\n곧 내용을 알 수 있을 만큼 곡에 적합한 제목들로 구성되었다. 이 중 <트로이메라이>는\n\n\n일곱 번째의 곡으로 느리고 조용한 선율로 유명하다.\n\n\n애조어린 유화환 선율에 부드러운 멜로디는 어린이들의 아름다운 꿈을 그려내고 있다.\n\n\n\n\n\n\n\n\n 19. 즉흥 환상곡 C# 단조 작품 66 / 쇼팽(Chopin)\n(Fantaisie- Impromptu in C sharp minor, Op,66)\n\n\n\n\n\n\n\n\n즉흥곡이란 순간적인 기분에 따라 악곡을 진행하는 형태를 말한다.\n\n\n쇼팽이 쓴 즉흥곡은 4곡이 있으며 <제1번, 4번>이 유명하다. 특히 제 4번 환상 즉흥곡은\n\n\n1834년의 작품으로 ‘환상’이란 제목은 그가 죽은 후 붙여졌다.\n\n\n그는 생전에 이 곡을 무척 아꼈으며 죽은 후에 파기해 달라는 유언을 남겼지만\n\n\n지금에 와서는 4곡의 즉흥곡 중 가장 널리 연주되고 있다. 화려한 기교, 감미로운 선율이 매혹적이다.\n\n\n\n\n\n\n\n\n 20. 가극 아이다 中 “개선 행진곡”/ 베르디(Verdi)\n(Aida ''Grand March'')\n\n\n\n\n\n\n\n\n수에즈 운하의 개통을 축하하기 위하여 1869년 이집트 국왕이 의뢰한것으로,\n\n\n오페라의 줄거리에 흥미를 느껴 작곡을 하였다. 그후 1872년 밀라노의 스칼라 극장에서\n\n\n자신의 지휘로 상연되어 크게 성공을 거두었던 작품으로, 가극 아이다 중 ‘개선행진곡’은\n\n\n2막 2장에 나오는 이집트군의 승리를 거두어 개선하는 즉 전승을 축하하는 트럼펫 행진곡이다.\n\n\n\n\n\n\n\n\n 21. G선상의 아리아 / 바하(Bach)\n(Air On The G String)\n\n\n\n\n\n\n\n\n관현악 조곡 제3번의 둘째곡의 아리아인데,\n\n\n빌헬미가 바이올린의 G 현으로만 연주하도록 C 장조로 편곡한 곡이며\n\n\n아리따운 한 여인과 사랑의 엄숙하고 경건한 인간적인 고뇌를 그려낸 작품이다.\n\n\n\n\n\n\n\n\n 22.가극 나비부인 중 “어떤 개인날” / 푸치니\n\n\n(MADAMA BUTTERFLY 'UN BEL DI VEDREMO')\n\n\n\n\n\n어떤 개인날 바다를 바라보며 애타게 그리는 한 여성의 기다리는 마음을 표현한 작품으로,\n\n\n푸치니의 오페라 “나비부인”중에서 가장 유명한 아리아이다.[* 마리아 칼라스의 음성이다 *]\n\n\n\n\n\n\n\n\n\n\n\n 23. 교향곡 6번 b 단조 Op.74 '비창' 中 1악장 / 차이코프스키(Tchaikovsky)\n\n\n(Symphony No.6 b minor Op.74 'Pathetique' 1Mov)\n\n\n\n\n\n차이코프스키 최후 최대의 걸작인 비창은\n\n\n서거의 해에 작곡되어 초연 1주일 후에 숨을 거두었다. 자신도 이 곡을 지적하여\n\n\n마치 진혼곡과도 흡사하다고 하며 흐느꼈다고 한다. 먼저\n\n\n아다지오의 무겁고 불길한 서주가 바순과 저현으로 꿈틀거리며 머리를 쳐든다.\n\n\n고뇌를 강조하는 압도적인 제 1주제, 슬프고 나약한 제2주제의 환상 가득한 아름다움,\n\n\n그러나 코다 에서는 모든 것을 체념하듯\n\n\n조용한 발길의 피치카토를 타고 인생의 수수께 기만을 그냥 남기고서...\n\n\n\n\n\n\n\n\n 24. 서곡“시인과 농부” / 주페(Suppe)\n(Poet and Peasant Overture)\n\n\n\n\n\n\n\n\n주페의 오페라타 곡 중 가장 널리 알려진 작품. 칼 엘머의 대본으로\n\n\n1864년에 작곡되어 같은 해 6월 빈에서 초연된 오페라타이다.\n\n\n현재에는 서곡만 연주되는데 각종 악기용의 편곡만도 59종이 넘는다.\n\n\n이 곡은 느리고 장중한 가락으로 시작되고 멜로디가 전원의 아침을 나타내는가 하면\n\n\n돌연 분위기가 바뀌어 행진곡이 되고 또 농부의 소박한 왈츠가 전개되었다가\n\n\n또다시 행진곡으로 된 뒤 최초의 가락이 나와 즐겁게 마무리되는 작품이다.\n\n\n\n\n\n\n\n\n\n\n\n 25.유모레스크 / 드보르작(Dvorak)\n(Homoresque / Flute)\n\n\n\n\n\n누구에게나 널리 애청된 이 곡은 원래 피아노 독주곡으로 된 것인데,\n\n\n근래에 와서는 바이올린 독주곡으로 편곡되어 많이 연주되고 있다.\n\n\n아름다운 가요풍의 멜로디에 애수를 띤 가벼운 무도조의 곡으로,\n\n\n곡은 세도막 형식으로 되어 있으며, 바이올린에 의해 가볍게 테마가 나타난다.\n\n\n제1부분이 끝나면 G 장조의 애조띤 선율로 나타났다가 다시 제1부의 반복으로 가볍게 끝난다.\n\n\n\n\n\n\n\n\n 26. 가극 춘희 중 “축배의 노래” / 베르디(Verdi)\n(La Traviata 'Drinking Song')\n\n\n\n\n\n\n\n\n\n\n\nLa Traviata(춘희) 1막에 나오는 파리 사교계의 여왕 비올렛타 저택에서 알리는 파티 중 축배음악.\n\n\n\n\n\n\n\n\n 27. 현악세레나데“아이네클라이네 나하트뮤직 ”2악장“ / 모차르트(Mozart)\n(Serenade in G major k525 Eine Kleine Nachtmusik-2-Romanze (Andante)\n\n\n\n\n\n\n\n\n\n\n\n“세레나데”란 일반적으로 흠모하는 사람의 창가에서 부르는 사랑노래를 얘기하는데\n\n\n악기로 연주하는 음악에서도 세레나데라고 부르는 경우도 있다.\n\n\n이 곡은 보통 현악 합주로 연주되지만 현악 5중주로 연주되기도 한다.\n\n\n1787년 빈에서 완성했으며, 화려하고 아름다운 멜로디로 그의 작품중 가장 널리 알려진 작품이다.\n\n\n\n\n\n\n\n\n\n\n\n 28. 로망스 제2번 F장조 / 베토벤 (Beethoven)\n(Violin Romance No. 2 in F, Op.50)\n\n\n\n\n\n\n\n\n누군가를 애타게 그리며 꿈을 꾸는 듯한 소녀의 연정처럼 아름다운 멜로디의 론도형식이 특색인 작품.\n\n\n\n\n\n\n\n\n 29. 빈 숲속의 이야기 / 요한시트라우스 (Johann Strauss)\n(Tales From The Vienna Woods)\n\n\n\n\n\n\n\n\n\n\n\n'아름다운 푸른 다뉴브'와 함께 이 곡도 스트라우스의 향토애가 짙게 깔린\n\n\n그의 대표작중 하나이다. 파리와 런던 여행을 마치고 빈에 머물러 있던 스트라우스는 빈의 봄거리를\n\n\n수놓은 자연의 아름다움과 고향에 몸을 담고 있는 안도감에 젖어 이 곡을 작곡하게 되었다고 한다.\n\n\n\n\n\n\n\n\n\n\n\n 30. 아를르의 여인 中 “메뉴엣” / 비제 (Bizet)\n[L''Arlesienne Suite No.2 Mov 3 (Menuetto)]\n\n\n\n\n\n프랑스 문호 도데의 희곡<아를의 여인>에 삽입된 27곡의 극음악으로\n\n\n후에 27곡중 4곡을 발췌해서 관현악용으로 편곡하여 널리 알려졌다. 이것이 <제1모음곡>이며,\n\n\n그 뒤 다시 4곡을 발췌하여 편곡한 것이 <제2모음곡>이다. 특히 희극 제3막 2장 중에 연주되는\n\n\n“메뉴엣”은 플룻독주로 청아하게 테마로 소개한 뒤 다소 거칠은 중간부를 두고\n\n\n FLUTE은 하프의 오틀리카토를 얻어 아름답게 끝난다.\n\n\n\n\n\n\n\n\n 31. 피아노 5중주곡 “숭어” 4악장 (주제와 변주곡) / 슈베르트 (Schubert)\n(Quintet in A Major, D.667 'The Trout' (4th)\n\n\n\n\n\n\n\n\n작곡가의 청춘이 신선하게 담겨진 실내악 작품이며, 가곡<숭어>의 선율을 테마로한 변주곡이다.\n\n\n\n\n\n\n\n\n 32.교향시 나의조국 中 “몰다우” / 스메타나 (Smetana)\n(Vltava No. 2 from “Ma Vlast”)\n\n\n\n\n\n\n\n\n보헤미아의 자연과 역사와 전설을 배경으로한 작품으로\n\n\n체코의 수도 프라하에 헌정 되었다. 1879년에 완성된 작품이다. 조국의 역사와\n\n\n자연을 소재로한 것으로써 강을 따라 흘러 내리면서 체코슬라바키아의 자연과 민속적인 것이\n\n\n잘 표현 한 작품이다. 6곡중 가장 아름다우며 향토성이 매우 짙은 작품으로 꼽히고 있다.\n\n\n\n\n\n\n\n\n 33. 리골레토 中 “여자의 마음 / 베르디 (Verdi)(Rigolette 'La Donna E Mobile')\n\n\n\n\n\n이탈리아 오페라 작곡가 <베르디>가 희곡 “임금님의 난행”을 바탕으로 1851년에 완성한 작품.\n\n\n“바람에 날리는 갈대와 같이 항상 변하는 여자의 마음” 가사로 불리어지는 유명한 작품.\n\n\n\n\n\n\n\n\n 34. 서곡“세빌리아의 이발사” / 롯시니 (Rossini)\n(Il Barbiere di Siviglia-Overture)\n\n\n\n\n\n보마르셰의 동명 희곡을 원작으로 한 전형적인 희가극 오페라로\n\n\n50편이 넘는 로시니의 작품 중 최고의 걸작으로 꼽힌다. 1816년에 완성하여 같은 해\n\n\n로마에서 초연 되었으며, 풍자와 윗트를 유감없이 발휘한 즐겁고 감명 깊은 곡이다.\n\n\n\n\n\n\n\n\n 35.바이올린 협주곡 e 단조 Op.64 1악장 / 멘델스존 (Mendelssohn)\n\n\n(Violin Concerto e minor Op.64 1 Mov)\n\n\n\n\n\n음악사상 가장 부유했으며 완벽한 음악적 조기교육을 갖췄던 작곡가이다\n\n\n멘델스존의 음악은 모두가 행복이 가득한 음악뿐이다. 바이올린 협주곡 1악장에서도\n\n\n 1 주제가 행복해 취한 여인의 멜랑꼬리 같은 느낌이며, 2 주제도 선정적인 노래조의 가락이다.\n\n\n 2개의 주제가 응답하며 변주되는 분위기는 듣는 이로 하여금 몹시도 행복해 취하게 한다.\n\n\n\n\n\n\n\n\n 36. 가극 라 토스카 3막 中 “별은 빛나건만” / 푸치니 (Puccini)\n\n\n\n\n\n\n\n\n오늘날 <라보엠>, <나비 부인>,과 함께 푸치니의 3대 걸작으로,\n\n\n1890년 경 밀라노에서 프랑스의 작가 사르두가 쓴 5막 희극을 본 후\n\n\n오페라화할 것을 결심하여 자코자.일리카에게 대본을 의뢰한 3막 오페라이다.\n\n\n특히 토스카 3막중 사형장에서의 마지막 심금을 토하는 카바라도시의 통곡이 담긴 아리아\n\n\n<별은 빛나건만>은 오늘날 명가수에 의해 무대와 레코드로 끝임 없이 불려지고 있다.\n\n\n\n\n\n\n\n\n 37. 교향곡 40번 G단조 K.550 제1악장 / 모차르트 (Mozart)\n\n\n(Symphony No.40 In G Minor, K.550 1st(Molto Allegro)\n\n\n\n\n\n그의 많은 교향곡 중에서 단조는 <제25번>과 <제40번> 2곡이 있으며 모두 G 단조로 되어있다.\n\n\n이 G 단조 작품에는 어두움과 비극적인 슬픔이 풍부한 감정으로 처리되고 있다.\n\n\n제 1악장 Molto allegro는  G단조 2분의2박자로 서주가 없는 소나타 형식.\n\n\n가슴을 에이는 듯한 슬픔의 제1테마가 바이올린으로 제시되고,\n\n\n탄식의 소리와도 같은 체념의 제2테마가 바이올린과 목관으로 나타난다.\n\n\n전개부는 주로 제1테마의 활용이고 제시부의 테마들이 확대되면서 제2테마를 거쳐 끝난다.\n\n\n\n\n\n\n\n\n 38.무도회의 권유 / 베버 (Weber)\n(Invitation to the Dance Op65)\n\n\n\n\n\n드레스덴 오페라극장의 지휘자로 있던 1817년에 오페라 가수 브란트와 결혼하면서\n\n\n생활에 안정을 찾게 되는데, 이 곡은 1819년에 완성하여 그의 아내에게 바쳐진 작품이다.\n\n\n‘어느 무도회에서 멋진 신사가 일어서서 젊은 숙녀에게 춤을 권한다. 처음에는 사양하지만\n\n\n왈츠 리듬에 맞추어 화려하게 춤을 춘다. 절정을 지나 처음의 선율이 나타나는데\n\n\n그것은 젊은 신사가 같이 춤을 춘 숙녀에게 감사를 하는 장면을 그린 것이다.\n\n\n\n\n\n\n\n\n 39. 토카타와 푸가 / 바하 (Bach)\n(Toccata & Fugue D minor)\n\n\n\n\n\n푸가의 대가인 바흐의 작품 중에서도 가장 유명한 작품으로 대략 1709년경에 쓴 작품으로\n\n\n알려지고 있다. 랩소딕한 토카타와 높은 봉우리를 서서히 기어오르는 듯한 푸가는\n\n\n소박한 대중의 마음을 사로잡는 작품으로 널리 알려져있다\n\n\n\n\n\n\n\n\n 40. 현악 4중주곡 D장조 작품64-5“종달새”중 제1악장 Allegro Moderato / 하이든 (Haydn)\n\n\n(Streichquartett D dur,Op.64-5 ''Lerchen'' 1st Mov.)\n\n\n\n\n\n1790년에 작곡한 것으로 <종달새>라는 이름은 제1악장 제1테마의 선율,\n\n\n제4악장의 음형에서 새의 지저귐이 연상되기 때문에 유래된 것이다. 세상의 시름을 다 잊고\n\n\n그저 즐겁기 만한 종달새가 하늘 높은 곳에서 움추렸던 날개를 마음껏 펼쳐보는 기쁨의 노래와 같다.\n\n\n\n\n\n\n\n\n 41. 장엄서곡 1812년 / 차이코프스키 (Tchaikovsky)\n(Ouverture Solennelle '1812' Op.49)\n\n\n\n\n\n1812년 9월, 나폴레옹 60만 대군이 모스크바 공격에 나섰지만 러시아 사람들이\n\n\n모스크바를 초토화 시켜버림에 결국 나폴레옹 군대는 강추위와 굶주림 속에 완패를 당하고\n\n\n겨우 3만 명의 패잔병이 파리로 돌아가게 된다. 이 곡은 러시아 군대의 승리를 그린 묘사음악으로\n\n\n프랑스 국가 “마르세예즈”와 러시아 선율 4개가 나온다. 이 곡이 초연될 당시\n\n\n대편성의 관현악이 동원되었는데 큰북 대신 포병대의 대포가 쏘아졌다는 얘기도 있다.\n\n\n\n\n\n\n\n\n 42.환상교향곡 제 2악장 무도회 / 베를리오즈 (Berlioz)\n(Symphony Fantasy, Op.14 2nd Un Ballo)\n\n\n\n\n\n사람들은 사랑하는 사람의 모습을 찾는 그를 아랑곳없이 춤에 한창이다. 그러다가 문득\n\n\n군중 속에서 발견한 애인의 모습 낯선 파트너와 함께 춤추며  인파 속으로 사라지는\n\n\n안타까움과 깊은 모정이 화려하고 소박한 무도회의 분위기 속에서 고유하게 그려진다.\n\n\n\n\n\n\n\n\n 43.피가로의 결혼-서곡 / 모짜르트(Mozart)\n(Le Nozze Di Figaro-Overtura)\n\n\n\n\n\n오페라<피가로의 결혼>은 1785년 가을부터 이듬해 4월에 걸쳐 작곡된 오페라 부파\n\n\n(희극적이고 밝은 것)인데, 보마르세(P.Beaumarchais)의 동명의 회곡을 오페라용으로\n\n\n각색한 작품이다. 서곡은 프레스토, D 장조, 2분의 2박자, 소나타 형식, 다만 소나타 형식이라고는\n\n\n하지만 전개부 대신에 짤막한 경과부가 두어졌다. 경쾌하고 명랑한 제 1주제, 유머스러운 제2주제,\n\n\n아주 짧은 경과부와 재현부를 거쳐 만하임 악파적인 떠들썩한 코다로 끝난다.\n\n\n또한 이 서곡은 짧기는 하지만 화창한 분위기를 빚어내므로,\n\n\n연주회 같은 데서 프로그램의 서두에 놓는 경우가 많다.\n\n\n\n\n\n\n\n\n 44. 피아노 소나타 제 23번 열정 f단조 Op 57 中 제 1악장 / 베토벤 (Beethoven)\n\n\n(Piano Sonata No.23 in f-minor, 'Appassionata' Op57, 1. Allegro assai)\n\n\n\n\n\n1804-1805년 사이에 완성된 곡으로, ‘열정’이라는 별명은 출판업자 크란츠가 붙였으며\n\n\n그가 사랑했던 테레제의 아버지에게 바쳐 졌다. 그의 많은 피아노 소나타 중\n\n\n최고라고 할 수 있는 걸작으로 테레제에 대한 갈망과 어쩌면 영원히\n\n\n이루어지지 않을 지도 모른다는 번민의 악상으로 표현 해주고 있다. 특히 매우 동요하는\n\n\n격한 감정이 담겨진 제 1악장은 피아노 협주곡의 카덴짜와 흡사한 즉흥 연주 스타일이다.\n\n\n\n\n\n\n\n\n 45. 페르귄트 제 1조곡 작품 64“아침의 기분” / 그리그 (Grieg)\n(Peer Gynt Suite No.1, Op.46 1st Morning)\n\n\n\n\n\n감미로운 애수가 깃든 노르웨이 민족 정서의 가곡. 새벽이 열리는 모로코 해변의\n\n\n아침기분을 클라리넷과 바순 플롯 등의 목관악기가 청조하게 그려나간다.\n\n\n\n\n\n\n\n\n 46. 팔려간 신부 서곡 / 스메타나 (Smetana)\n(The Bartered Bride,Overture)\n\n\n\n\n\n1859년 오스트리아는 이탈리아에 참패를 하며 소수민족에 대한 탄압을 완화하기에 이른다.\n\n\n이에 체코에는 새로운 희망이 싹트기 시작했다. 그 당시 스메타나는 스웨덴에서 활동하고 있었는데\n\n\n이러한 조국의 소식을 듣고 1861년에 귀국하여 국민적 오페라를 발표하였다. 이 곡은 이러한 의도에서\n\n\n작곡된 2번째 작품으로 그에게 있어서 최고의 걸작으로 꼽힌다. 향토적인 민속무곡을 재치 있게 살리고\n\n\n야성적인 농민들의 꾸밈새 없는 열광이 즐겁기 만한 작품으로 1863년 완성되었다.\n\n\n\n\n\n\n\n\n 47. 목신의 오후에의 전주곡 / 드뷔시 (Debussy)\n\n\n(Prelude a l''apres-midi d''un faune)\n\n\n\n\n\n프랑스의 상징파 시인인 말라르메의 詩에 곡을 붙인 오케스트라이다.\n\n\n1894년에 완성되어 이듬해 초연에서 대호평을 받았다. 그리스 신화에 나오는 머리와 몸통은 사람이고\n\n\n허리 밑으로는 짐승처럼 생긴 목신의 이야기이다. 무더운 여름날의 오후 나무그늘 아래서 졸던 목신은\n\n\n잠을 깬다. 그의 마음은 꿈과 현실 속에서 떠다닌다. 목신이 환상의 나래를 펴다가\n\n\n환상이 사라지고 풀 위에 누워버린 목신은 풀 향기 위에서 다시 존다.\n\n\n\n\n\n\n\n\n 48. 교향곡 제41번 C장조 “쥬니퍼”중 제 1악장 / 모짜르트(Mozart)\n\n\n(Symphony No.41 C Major ''Jupiter'' 1st Mov.)\n\n\n\n\n\n모차르트 마지막 교향곡으로 착수한지 16일만에 완성되었지만,\n\n\n내용이나 규모면 에서는 그가 쓴 기악곡 중 최고라고 할 수 있다. 여기서 ‘주피터’란\n\n\n그리스 신화에 나오는 최고의 조물주 이름으로 이 작품의 창조적인 웅대함에 걸 맞는다고\n\n\n할 수 있으나, 이 표제는 모차르트에 의한 것이 아니고 후세에 붙여진 것이다\n\n\n\n\n\n\n\n\n 49. 칼멘 中 하바네라 / 비제 (Bizet)\n\n\nCarmen L'amour Est Un Oiseau Rebelle(Habanera)\n\n\n\n\n\n1875년 파리의 오페라 코미크 극장에서 초연된 이 4막 가극은, 그 당시는\n\n\n대단한 평판을 얻지는 못했지만, 비제의 사후 그 가치를 차츰 인정받게 되었고,\n\n\n오늘의 명성과 영예를 얻기에 이르렀다. 특히 칼멘역을 맡은 메조스포라노가\n\n\n좀더 관능적인 표현과 쏘는듯한 윙크, 유혹적인 제스쳐로 부르는 전주곡\n\n\n<하바네라의 노래>는 바이올린곡아나 피아노곡으로 편곡되어 널리 사랑받고 있다.\n\n\n\n\n\n\n\n\n 50. 마돈나의 보석 / 볼프 페라리\n\n\n(The Jewels of Madonna)\n\n\n\n\n\n이태리의 작곡가 볼프 페라리(1876·1948)가 1911년에 발표한 오페라 성모의 보석의 간주곡\n\n\n 제1번을 옮긴 멜로디이다. 성모의 보석은오페라도 유명하지만 간주곡 1번으로도 널리 알려져 있다.\n\n\n\n\n\n\n\n\n 51. 찌코이네르 바이젠 / Sarasate\n\n\nzigeunerweisen\n\n\n\n\n\n제목 그대로 스페인에 <집시의 노래>로서, 화려하고 세련된 애상과 정열을 담은 명곡이다.\n\n\n 19세기의 음악계를 열광시켰던 바이올린의 마신 사라사테의 작품. 스페인 집시들 사이에 전하는\n\n\n여러 무곡을 소재로 해서, 다양한 기법과 표정을 담아 바이올린 독주곡.\n\n\n\n\n\n\n\n\n 52.현과 오르간을 위한 아다지오 / Albinoni(알바노니)\n\n\nAdagio g-mol\n\n\n\n\n\n'현과 오르간을 위한 아다지오(Adagio in G minor)'는 현악기와 오르간 반주로 이루어진\n\n\n슬픈 곡이다. 곡의 첫 부분부터 슬프면서도 아름다운 선율이 가슴을 저미게 하면서\n\n\n우리를 빠져들게 하는데, 특히 중간에 현악기와 오르간이 한꺼번에 연주하는 클라이막스\n\n\n부분에선 가슴이 무너져 내리는 듯 하는 느낌이 든다.\n\n\n\n\n\n\n\n\n 53. 피아노 협주곡 제2번 C단조 작품18 제1악장 - 모데라도 / 라흐마니노프 (Rakhmaninov)\n\n\nPiano Concerto No. 2 in C minor, Op. 18 - 1. Mvt . Moderato\n\n\n\n\n\n1901년에 완성되어 같은 해 모스크바에서 초연된 작품으로\n\n\n차이코프스키의 (제1번)과 쌍벽을 이룰 만큼 많이 연주 되고 있다. 섬세하게 다듬는 악상에\n\n\n정서가 깊고, 천재 피아니스트답게 피아노의 효과도 충분히 발휘하고 있다.\n\n\n\n\n\n\n\n\n 54. Ave Maria / Caccini\n\n\n\n\n\n이탈리아 로마 출생. 그의 오페라 <에우리디케 Euridice>(1600)는 가장 오래된\n\n\n오페라의 하나로 꼽히고 있고, 카메라타의 중심 인물인 카치니(G. Caccini 1545∼1618)와\n\n\n갈릴레이(V. Galilei 1520∼1591)는 최초로 반주가 딸린 서정가곡을 만들었는데,\n\n\n아름답기 그지없는 이 곡 '아베마리아'가 바로 카치니의 작품입니다.\n\n\n\n\n\n\n\n\n 55. 클라리넷 협주곡 제 2악장 / 모짜르트(Mozart)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n 56. Carmina Brana / Orff (오르프)\n(카르미나 부라나)\n\n\n\n\n\n고리야드 즉 여러나라를 편력하는 학생이나 젊은 성직자들이 라틴어로 쓴 10-13세기의\n\n\n세속 시집에서 24곡을 골랐으며 거기에 자신이 직접 쓴 시를 1곡 보태어 작곡했다.\n\n\n\n\n\n\n\n\n 57. Una Furtiva Lagrima Da L'Elisir d'Amore / G.Donizetti(도니체티)\n\n\n오페라 [사랑의 묘약] 중 '남몰래 흐르는 눈물'\n\n\n\n\n\n오페라 '사랑의 묘약 (L''Elisir d''amore)'은 이탈리아 작곡가 G.도니체티의 2막으로 된\n\n\n희가극(喜歌劇)으로 싸구려 포도주를 사랑의 묘약으로 알고 속아서 사 마신 순진한 청년\n\n\n네몰리노가 술에 만취되어 사랑하는 여인 아디나에게 거절당하는데, 우연히 유산이 굴러 들어와\n\n\n만사가 원만하게 끝난다는 내용. 제2막에서 네몰리노가 부르는 테너의 아리아 '남 몰래 흘리는 눈물\n\n\n(Una Furtiva Lagrima)'은 워낙 널리 애창되고 있어서 우리들의 귀에도 아주 친근한 곡이다.\n\n\n\n\n\n\n\n\n 58. Rigoletto 'Caro Nome' / Verdi\n\n\n오페라(리골레토)중 '그리운 그 이름'\n\n\n\n\n\n베르디의 오페라 '리골레토(Rigoletto)'는 빅토르 위고의 희곡을 피아체가 대본으로 만들어\n\n\n작곡된 비가극으로 테너가 부르는 제2막의 '여자의 마음(La donna e mobile)'과 함게\n\n\n제1막의 '그리운 그 이름'이 유명하다.\n\n\n\n\n\n\n\n\n 59. 'Last Exit to Brooklyn' OST- A Love Idea / 마크 노플로 (Mark Knopfler)\n\n\n'브룩클린으로 가는 마지막 비상구'의 'A Love Idea'\n\n\n\n\n\n1990년에 발매된 영화 '브룩클린으로 가는 마지막 비상구'의 OST 앨범.\n\n\n'올리 에델' 감독에 '제니퍼 제이슨 리'와 '스테판 렝'이 주연을 맡았던 이 영화는\n\n\n뉴욕의 가장 큰 우범지대인 브룩크린을 배경으로 벌어지는 인간사를 차분히 그려주고 있다.\n\n\n대부분의 음악들이 트렘펫과 잔잔한 드럼, 긴박감 있는 봉고리듬으로 어두운 주제를\n\n\n상징화 시키고 있다는데, 특히, 들어보지 않고는 말로 할 수 없는 곡이라 할 정도로\n\n\n'David Nolan'의 바이올린 연주가 일품이 이곡은 작곡가\n\n\n마크 노플러(Mark Knopfler)의 능력에 감탄하지 않을 수 없게 한다.\n\n\n\n\n\n\n\n\n 60. Canon / Pachelbel(파헬벨) 캐논 변주곡\n\n\n\n\n\n바흐 이전 독일 오르간 음악의 대가였던 파헬벨은\n\n\n현악기에도 남다른 소질이 있었다고 한다. 원제가 '3개의 바이올린과 통주저음을 위한 캐논과\n\n\n지그'인 이 캐논(Canon)은 현재는 주로 현악 합주용으로 연주되지만 원래는 4중주 편성에 의해서\n\n\n경쾌한 지그와 쌍을 이뤄 연주되었다. 지그(gigue)란 영국의 무곡(舞曲)이 17∼18세기에\n\n\n유럽대륙으로 건너가 발전한 기악곡 형식 중 하나라고 한다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n				음악을 사랑하는\n\n				http://cafe.daum.net/loveoniy\n\n\n\n\n\n\n\n\n\n\n\n\n					카페 가입승인제 기능 오픈\n					에디터 파일첨부 용량이 늘어났습니다.\n\n\n\n\n					카페 정모 기념품을 지원합니다!\n					신규 카페게임 '비바 삼국지' 오픈"

                info: "인터넷소설넷쮸 유령회원 숙청 및 리뉴얼\n			안녕하세요. 인터넷소설넷쮸 운영자 니컬입니다.\n\n\n인터넷소설넷쮸의 리뉴얼을 위해 유령회원을 정리하고자 합니다.\n\n\n\n\n\n\n\n\n1차 정리\n-정리기간 : 11월 14일 ~ 11월 18일\n\n\n-정리대상 : 1년 이상 미방문 회원 강퇴\n\n\n\n\n\n2차 정리\n\n\n-정리기간 : 11월 19일 ~ 11월 25일\n\n\n-정리대상 : 6개월 이상 미방문 회원 강퇴\n\n\n\n\n\n3차 정리\n\n\n-정리가간 : 11월 26일 ~ 11월 30일\n\n\n-정리대상 : 글 수 2개, 댓글 5개 이하 정회원 강등\n\n\n\n\n\n\n\n\n정회원 등업조건인 정보공개 설정과 전체메일 받음 설정이 변경되어있는 분들은\n\n\n경고없이 강등 처리하도록하겠습니다.\n\n\n\n\n\n\n\n\n\n\n\n제가 많은걸 바라는게 아닙니다.\n\n\n회원분들의 최소한을 부탁드리는 것입니다.\n\n\n\n\n\n그것이 안되는 분들이 계셔서 피의 숙청을 감행하고자 합니다.\n\n\n\n\n\n\n\n\n\n\n\n또한 등업방법이 변경되는 등 리뉴얼작업이 진행중입니다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n그럼 즐거운 하루 보내시기바랍니다.^^\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n				인터넷소설넷쮸\n\n				http://cafe.daum.net/spem\n\n\n\n\n\n\n\n\n\n\n\n\n					카페 가입승인제 기능 오픈\n					에디터 파일첨부 용량이 늘어났습니다.\n\n\n\n\n					카페 정모 기념품을 지원합니다!\n					신규 카페게임 '비바 삼국지' 오픈\n\n\n\n\n"

                x: 10,

                color: "#AC575E",
                info: "ergoDM_C\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n	마음의 여유를 가질 수 있는 멋진 가을 보내세요.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n	이 메일은 정보 통신망이 용촉진 및 정보보호 등에 관한 법률에 의거해, 발송기준인(2012년 11월 14일) 현재 e-mail.수신에동의하신 고객님을 대상으로 에르고다음다이렉트손해보험 홈페이지에 회원 가입 및 이벤트 참여, 보험료 산출/견적 예약시제공해주신e-mail주소로 발송하는 발신전용 메일입니다.메일수신을 원하지 않으시는 분은 [수신거부]를 클릭해 주십시오.\nthis mail was sent ay your requst. To unsubscibe, please [clike here]\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n	␀"

            {
                id: "<no-message-id-3775648610623188617@local>",
                name: "세상에서 가장 아름다운 연주곡 모음/Consuelo\"s Love Theme 외 50곡",
                x: 39,
                y: 39,
                color: "#589310",
                info: "세상에서 가장 아름다운 연주곡 모음/Consuelo\"s Love Theme 외 50곡\n\n\n\n\n\n\n\n\n\n//\n\n\n\n\n\n\n\n\n\n//\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n01. Consuelo\"s Love Theme - James Galway & Cleo Laine\n\n영국 출신의 백인여성 재즈가수로 1980년 작품.\n\n\n\n02. Jeg Ser Deg Sote Lam (당신곁에 소중한 사람) - Susanne Lundeng\n\n스웨덴 출신의 월드 뮤직 연주자로 1997년 작품.\n\n\n03. Calcutta - Lawrence Welk\n\n이지리스링 연주 악단\n\n\n04. Amsterdam Sur Eau (물위의 암스테르담) - Claude Ciari\n\n프랑스 출신의 팝 기타리스트 \"끌로드 치아리\"의 70년대 말 작품 으로 멋과 낭만이 깃든 감미로운 연주곡. 끌로드 치아리는 63년 첫 솔로작 \"HUSHABYE\"를 발표 한 후 일약 스타로 뛰어 오른 팝 기타리스트로 주요 작품으로는 \"첫 발자욱\"과 함께 \"LA PLAYA\", \"NABUCO\", 엠마누엘 부인\" 등이 있다.\n\n\n05. Recuerdos De La Alhambra (알함브라 궁전의 추억) - Narciso Yepes\n\n1927년 스페인 동남부의 로르카니 출신의 작곡가 겸 기타리스트.\n1952년 프랑스 영화(금지된 장난)의 음악을 맡아, 세계적인 명성을 얻었다.\n\n\n06. Serenade To Summertime (여름날의 세레나데) - Paul Mauriat\n\n폴 모리아의 1969년 작품으로 라디오 시그널로 유명한 작품.\n\n\n07. Rise - Herb Albert\n\n이전의 라틴 팝으로부터 멋을 부린 퓨전으로 변신했던 시기에 발표하였던 \"허브 앨버트\"의 걸작.\n\n\n08. Time Is Tight - Booker T & Mgs\n\n아마도 완전한 연주만의 히트곡을 발표한 최후의 록 그룹이 었다고 할 수 있는 부커 티 엔더 엠지스는 60년대 멤피스 사운드의 창조자로서 가장 잘알려졌다.\n\n\n09. Tuff - Ace Cannon\n\n우리나라에 전후 한 바탕 팝송·붐이 있었다.\n청순 가련한 \"데비 레놀즈\", 세련된 왈츠의 맛을 보여주었던 \"패티 페이지\" 등 많은 팝 스타가 태어났다.\n그리고 한국어 제목이 붙여지고 사랑받게 된 작품도 많다. 그런 음악의 대표작중 하나가 바로 \"미망인의 부르스\"라 불리는 \"Tuff\"이다.\n\n\n10. Concerto De La Mer (바다의 협주곡) - Jean Claude Borelly\n\n70년대 후반 프렌치 사운드를 주도했던 프랑스 출신의 \"장 끌로드 보렐리\"의 1976년 히트곡 이다. 국내 팬들에게는 \"바다의 협주곡\"으로 잘 알려진 이 곡은 80년에 발표된 \"돌란스 멜로디\"(DOLANNES MELODY)와 함께 큰 인기를 끌었다.\n\n\n11. Il Silenzo (밤하늘의 트럼펫) - Nini Rosso\n\n이태리의 트럼펫터 니니 롯스의 연주로 너무나 유명한 트럼펫 무드의 명곡. 니니 롯스가 발표한 레코드는 여러나라의 인기순위 No.1에 오름과 동시에 밀리언 셀러를 기록할 만큼 큰 인기를 모은 작품이다.\n\n\n12. Wonderland By Night (밤하늘의 부르스) - Bert Kaempfert\n\n1960년대 국내에서 가장 인기를 모은 러브 사운드의 주인공 \"베르 트 켐페르트 악단\"의 히트곡.\n특히 독일 출신 가운데 미국시장을 석권한 아티스트는 \"베르트 켐페르트\"가 최초.\n제 2차 세계 대전 중에 자국의 병사들을 위문하기 위해 조직된 악단으로 대전의 아픔을 안겼던 적국에게 물리력이 아닌 선율공습을 단행하여 재패하였으니, 보복치고 꽤나 낭만적이며 아름답다 할 수 있다.\n\n이 곡은 1961년 1월부터 3주동 안이나 미국에서 1위를 기록하였고, 그 외 유명 가수들이 앞다투어 취입하여 60년대 전 세계적으로 히트가 되었는 곡이다.\n\n\n13. Forever With You - Modern Pops Orchestra\n\n\n\n\n14. Forever In Love - Kenny G\n\n소프라노 색소폰으로 국내에 재즈 열풍을 일으킨 케니지의 대표작.\n\n\n15. Rain - Jason Becker\n\n젊은 나이에 ALS(근위축성 측색경화증)라는\n불치병에 걸린 아까운 천재 기타리스트 Jason Becker의 작품.\n\n\n16. A Walk In The Black Forest - Horst Jankowski\n\n경쾌한 터치의 피아노 연주는 \"숲을 걷자\"라고 하는 것보다도 \"숲을 달리자\"라고 한 느낌이 드는 작품. 리듬을 새기는 기타의 커팅에, 피아노 의 주선율보다 더욱 깊게 원근감이 있는 사운드 처리가 베풀어지고 있는 명곡.\n\n\n17. Pearly Shells (진주조개잡이) - Billy Vaughn\n\n오아프 섬의 옛노래 \"에바의 조개\"에 의해\n하와이 콜즈의 주재자로서 유명한 웨브리 에드워즈가 L.포버와 1962년에 합작했다. 60년 존웨인. 리 마빈 주연영화\"도노반\"에 쓰여져 화제가 되었고 1965년 빌리본 악단의 댄싱 무드 연주가 한국에서 대히트하면서 파퓰러 넘버에 끼게 되었다.\n\n\n18. Cavatina - John Williams\n\n철강 노동자였던 미국의 젊은이들이 월남전에 참전, 포로가 되어 온갖 비인간적인 행위에 고통받고 끝내 정상적인 생활로 돌아오지 못하는 내용을 통해 전쟁의 후유증을 그린 수작 전쟁 영화 \"디어헌터\"의 주제곡.\n\n\n19. Jeux Interdits (금지된 장난) - Claude Ciari\n\n원래 스페인 민요(La Romance)인 이 곡은 1952년 프랑스에서 제작된 영화 \"금지된 장난\"에서 나르시스 예페스의 조용한 독백과도 같은 기 타테마가 세계적으로 유명해진 작품이다.\n\n\n20. Medaille D''honneur (MBC 스포츠 시그널) - Carlos D''Alessio\n\n유명한 프랑스 행진곡으로 프랑스 영화\n델리카트슨 사람들(Delicatessen) 이라는 영화에 삽입 되었던 작품.\n\n\n21. Bugler\"s Holiday (나팔수의 휴일) - Leroy Anderson\n\nLeroy Anderson(1908-1975)은, 미국에서는 정말로 인기가 있던 작곡가로, 메사 츄세스주태생. 하버드 대학에서 어학의 교편을 취하고 있 었지만, 보스턴 관현악단을 위해서 팝이나 재즈 스탠다드의 오케스트라 편곡을 다룬 후에 작곡가로 시작, 지휘자로서도 활동을 했다.\n그의 작품은 아이디어에 흘러넘쳐 모두가 흥얼거릴 수 있는 파퓰러인 작품으로, 과 거 히트 차트를 요란하게 했다.\n\n\n22. Baby Elephant Walk (아기 코끼리의 걸음마) - Henry Mancini\n\n아프리카의 대초원에서 벌어지는 야생동물 생포에 관한 호쾌한 액션극 영화 \"하타리\"의 대표적인 영화 음악. 특히 \"아기 코끼리의 걸음마\"는 유머스러우면서 흥겨운 선율로 크게 히트한 인기곡이다.\n\n\n\n23. Autumn Leaves - Roger Williams\n\n너무나 널리 알려진 프랑스의 걸작 샹송 \"Les Feuilles Mortes\"가 원곡.\n헝가리 태생의 피아니스트이기도 한 조셉 코스마가,\n1945년에 초연된 롤랑 푸티의 발레 \"랑데부\"를 위해서 작곡한 멜로디로, 1946년의 프랑스 영화 \"밤의 문\"에서 주연인 이브 몽땅이 처음 불렀으며, 1955년에는 피아니스트인 로저 월리엄스의 레코드가 밀리언 히트가 되어 월리엄스를 일약 스타로 만들었다.\n특히 \"로저 월리엄스\"는 처음부터 피아노 교육을 받은 사람이 아니고 어릴적에 불의의 사고를 당해 손을 다치자 손가락이 굳는 것을 방지하기위해 피아노을 배움.\n\n\n24. El Bimbo - Claude Ciari\n\n원래 프랑스의 그룹이 발표하여 유럽에서 크게 히트하였던 곡이다. 이같은 히트에 힘입어 마스터 기타라는 별명의 \"클라우드 치아리\"가 클래식 기타로 연주 발표하였고, 특히 우리나라에서 크게 히트했던 작품.\n\n\n25. Telstar (텔스타) - Tornadoes\n\n1962년 미국의 통신용 인공위성 \"텔스타\" 발사성공에 따라 완성된 곡. 영국의 5인조 로크 그룹인 토네이도스가 불러 그 해 11월 3일 빌보드 차트에 85위에 올라 순식간에 상승되었으며, 드디어 전미 NO.1의 자리를 차지하였고, 1963년에는 베스트 셀러가 되었다.\n\n\n26. Thanksgiving - George Winston\n\nWindham Hill 라벨을 대표하는(가장 인기가 있다) Artist \"George Winston\"의 명작. 한마디로 말하면, 아름다운 선율의 솔로·피아노 사운드에,\n메아리가 걸린 피아노음이 훌륭한 작품. 특히, 80년대~90년대 초두에 제작된 사계를 테마로한 작품군의 질이 높고 80년대에 태어난 영원한 클래식이라고도 표현할 수 있다.\n\n\n27. Prince Of Cheju (KBS 오정해의 FM 풍류마을 - (Ryo Kunihiko=양방언)\n\n재일교포 2세 음악가 양방언(梁邦彦 : 료 쿠니히코)의 세번째 앨범 Only Heaven Knows 에 네번째 트랙으로 수록된 곡.\nKBS 오정해의 FM 풍류마을 시그널 음악으로 더욱 유명해진 작품.\n\n\n28. Music Box Dancer - Frank Mills\n\n프랭크·밀스의 곡이 국내에서 사랑받을 수 있었던 계기는, 과거 라디오 프로그램 시그널 음악으로 사용된 \"Music Box Dancer\"의 리퀘스트가 많았기 때문이다.\n차분 한 느낌으로 들으면 매우 상냥한 기분이 들 수 있는 밀스의 명작. 아침 분위기의 곡이지만 밤에 들어도 로맨틱한 느낌이드는 작품.\n\n\n29. A Love Idea - Mark Knopfler\n\n1990년에 발매된 영화 \"브룩클린으로 가는 마지막 비상구\"의 OST 앨범.\n\"올리 에델\" 감독에 \"제니퍼 제이슨 리\"와 \"스테판 렝\"이 주연을 맡았 던 이 영화는 뉴욕의 가장 큰 우범지대인 브룩크린을 배경으로 벌어지는\n인간사를 차분히 그려주고 있다. 대부분의 음악들이 트렘펫과 잔잔한 드, 긴박감 있는 봉고리듬으로 어두운 주제를 상징화 시키고 있다는데, 특히, 들어보지 않고는 말로 할 수 없는 곡이라 할 정도로\n\"David Nolan\"의 바이올린 연주가 일품이 이곡은 작곡가\n마크 노플러(Mark Knopfler)의 능력에 감탄하지 않을 수 없게 한다.\n\n\n30. Gypsy Violin (Darling Lily) - 밀애 OST\n\n\n\n\n31. Before The Rain - Lee Oskar\n\n\"WAR\"의 하모니카 연주자 출신인 \"리 오스카\"의 국내 인기곡. 1948년 덴마크의 코펜하겐 태생. 에니멀즈의 에릭·버든과 알게 되어, 그의 밴드, 워에 참가. 1976년부터 솔로 활동을 시작했다.\n이 곡은 1978년 같은 제목의 앨범 타이틀로 70년대 발표된 퓨전 재즈의 명곡. 덴마크 출신의 하모니카 연주자로 한국에서 많은 사랑을 받았음.\n\n\n32. Only Our Rivers Runs Free - James Last\n\n독일 출신의 팝 오케스트라의 리더로 87년 작품. 종교적인 색채를 띤 곡으로 각종 드라마 배경음악으로 자주 소개됐던 곡.\n\n\n33. Ballade Pour Adeline (아드린느를 위한 발라드) - Richard Clayderman\n\n프랑스 출신의 팝 피아니스트로 이 곡은 우리나라에서 악보가 가장 많이 팔리는 기록을 세웠다\n\n\n34. Hymn - Bill Douglas\n\nKBS 1 FM의 프로 \"당신의 밤과 음악\"의 시그널 뮤직. 바쑨(bassoon)의 낭랑한 운율이 울려 퍼지면서 우수의 노스탤지아를 불러일으키는 빌 더글러스 작품. 빌 더글러스의 서정과 바쑨이란 악기의 음색이 맞아 떨어져 로맨티시즘을 한껏 부풀려준다.\n\n\n35. Poeme - Secret Garden\n\n노르웨이 출신의 혼성듀오로 팝과 클래식을\n적절하게 융합된 크로스오버 음악을 구사하는팀.\n\n\n36. The Messiah Will Come Again - Roy Buchanan\n\n미국 출신의 블루스 기타리스트 \"로이 부캐넌\"의 1972년 데뷔 히트곡. 이 곡은 고해성사를 하는 듯한 나레이션과 슬픔이 깃든 기타 연주가 일 품인데, 국내에서는 80년대 중반 블랙 디스크로 발매되어 스테디 셀러로\n꾸준히 애청됐던 블루스 기타의 고전이다.\n\n\n37. Cloudy Day - J.J Cale\n\n미국 출신의 블루스 기타리스트로 1981년 작품.\n\n\n38. Danny Boy - Sil Austin\n\n흑인 테너 섹소폰 주자 실오스틴의 연주로 너무나 유명한 작품. 원곡은 북아일랜드의 오랜 항구도시 런던 데리에서 불려 지던 아름다운 \"런던 데리의 노래\"이다.\n\n\n39. Washington Square - Village Stompers\n\n7인조 악단 Village Stompers의 연주로 널리 알려진 이 곡은 빌 보드지 등에서 계속 상위를 차지한 대 히트곡이었다. 그 후로 이 곡에 가사 가 붙여져 더욱 미국에서 유행되는 대 히트 기록했는데, 포스터의 음악이 대부분 그렇듯 여기 에서도 흑인 풍의 무드가 물씬 풍겨져 나온다. 미치 밀러 합창단, 로저 와그너 합창단 등의 화음으로 유명하며, 국내 에서는 김치켓츠의 개사곡이 널리 알려져 있다.\n\n\n40. Wheels (언덕위의 포장마차) - Billy Vaughn\n\n\n\n\n41. Karelia (안개 낀 까렐리아) - The Spotnicks\n\n스웨덴 출신 남성 일렉트릭 인스트러멘털 그룹\n\"스푸트닉스\"의 대표작.\n\n\n42. Pipeline - Chantays\n\n국내 디제이의 대부. 최동욱씨를 최고의 스타로 만들어줬던 동아방송 - Top Tune Show의 시그널음악으로 더욱 유명해진 작품.\n\n\n43. Wipe Out - Surfaris\n\n62년부터 67년까지 남부 캘리포니아를 중심으로 활동한 The Surfaris의 명곡.\n\n\n44. Shanghai Twist - Ventures\n\n워싱턴주 타코마 출신으로서 3대의 박진감 있는 기타와 드럼으로 구성된 4인조 그룹 \"벤쳐스\"의 대표작.\n\n\n45. Red River Rock - Johnny & The Hurricanes\n\n\n\n\n46. Petite Fleur (귀여운 꽃) - Chris Barber's Jazz Band\n\n1891년 미국의 뉴올리언스에서 태어나 1959년 파리에서 사망한 흑인 소프라노 겸 클라리넷 주자 시드니 베세의 작품이다. 악보는 52년에 출 판되었고 58년경 세계적으로 유행했다.\n원래는 기악곡이며 프랑스어 가사는 페르랑 보니페 외에 몇 종류가 있다.\n\n\n47. Stranger On The Shore - Acker Bilk\n\n곡은 클라니넷 무드의 명곡으로 잘 알려져 있으며 영국의 클라리넷 주자 \"Acker Bilk\"가 1961년에 출반한 작품 이다. 처음에는 \"제니\" 라는 제목으로 출반 됐으나, 영국 BBC방송에서 아동을 위한 TV 드라마(해변의 길손)에서 주제곡으로 사용 되면서 곡명이 바뀌었다. 애커 빌크의 연주는 미국과 영국에서 1위가지 오를 정도로 대히트를 기록했으며, 입으로 부는 바이올린이라고도 부르는 클라이넷의 애수어린 음색은 지금도 우리들의 가슴에 젖어들곤 한다.\n\n\n48. A Wonderful Day - Sweet People\n\n스위스 출신의 4인조 이지리스닝 연주 그룹. 시냇물 소리, 새소리 등 효과음과 아름다운 연주곡으로 국내에서 많은 사랑을 받았던 1981년 작품.\n\n\n49. Emotion - Francis Lai\n\n프랑스 출신의 영화음악 작곡가 \"프란시스 레이\"의 1967년 작품.\n\n\n50. Einsamer Hirte (외로운 양치기) - Gheorghe\n\n독일의 세계적인 오케스트라 제임스 라스트가 작곡하여 \"조르지 잠피르\"에게 헌정한 \"외로운 양치기\"는 1977년 한 해 동안 유럽에서만 1백 50만장 이상의 레코드가 팔리는 밀리언셀러가 되었다. 이 곡은 국내에서도 대호평을 받아 팬 푸르트하면 제일 먼저 떠오르는 대명사적인 곡으로 알려졌다.\n\n\n51. Love Is Blue - Paul Mauriat Orc\n\n무드 음악의 거장 \"폴 모리아\"의 1968년 곡으로\n빌보드 싱글 차트 5주간 정상에 올랐던 곡이다. 원곡은 앙드레 포프의 작품으로 1967년 제12 회 유로비전 송컨테스트에 룩샘 부르크 대표로 출전한 \"비키 레안드로스\"가 불렀다. 다음해 1968년 폴 모리아 악단이 발표하여 사상 최대의 인기를 모은 곡이다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n				음악을 사랑하는\n\n				http://cafe.daum.net/loveoniy\n\n\n\n\n\n\n\n\n\n\n\n\n					카페 가입승인제 기능 오픈\n					에디터 파일첨부 용량이 늘어났습니다.\n\n\n\n\n					카페 정모 기념품을 지원합니다!\n					신규 카페게임 '비바 삼국지' 오픈"

                id: "<no-message-id-946983129886823655@local>",
                name: "★ 카페 물갈이, 가입제한 안내 & 신년 이벤트 안내",
                x: 95,
                y: 58,
                color: "#0DBFF8",
                info: "★ 카페 물갈이, 가입제한 안내 & 신년 이벤트 안내\n\n\n\n\n\n\n오랜만에 찾아뵙는 공지사항이 기쁜 소식만이 아니라 죄송할 따름입니다.\n\n\n\n\n\n\n\n\n사실 크리스마스 이전에 카페 이전 공지로 찾아 뵈려고 했었습니다. 잦은 불펌도 있고, 여러가지 작가님의 개인적인 사정으로 카페 이전을 하고자 했었는데 막상 이전을 하려고 하니 걸리는 게 한 두가지가 아니어서 바로 이틀 전에 그 결정을 번복하고야 말았습니다. 카페 이전 결정은 약 한달 반 전부터 이야기가 오고 있던지라 리뉴얼로 찾아뵙겠다던 꽃의낙인 역시 새 카페에서 새 소설로 연재하자고 이야기가 오고 가고 있었고, 해서 재연재가 되고 있지 않았었습니다.\n\n\n\n\n\n\n\n\n결정 번복으로 카페 이전을 안하는 대신 카페 전체 물갈이가 진행될 예정입니다. 카페 회원은 많으나 활동/방문을 하지 않으시는 분들이 많습니다. 그런 분들을 줄여나가기 위한 물갈이 과정이니 양해 부탁드립니다.\n\n\n\n\n\n\n\n\n우선 지금까지 2009년 한번을 제외하고 강퇴 물갈이는 한 적이 없었으나 이번에 카페 전체 물갈이를 통해 강퇴 물갈이가 있음을 알려드립니다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n먼저 회원 물갈이부터 안내를 드리자면,\n\n\n\n\n\n\n물갈이 기준은\n\n\n\n\n\n\n\n준회원 - 최종방문일 2012년 이전 회원 강퇴 (2011년 12월 31일)\n\n\n정회원 - 최종방문일 2012년 이전 회원 준회원 강등 (2011년 12월 31일)\n\n\n우등회원 - 최종방문일 9월 이전회원 정회로 강등 (8월 30일 포함)\n\n\n우수회원 - 최종방문일 9월 이전회원 정회로 강등 (8월 30일 포함)\n\n\n최우수회원 - 최종방문일 10월 이전 회원 우수로 강등 (9월 30일 포함)\n\n\n특별회원 - 최종방문일 11월 이전 회원 최우수로 강등 (10월 30일 포함)\n\n\n\n\n\n\n\n\n\n\n\n날짜는 준회원은 당장 오늘부터 진행할 예정이며, 정회원~특별회원의 경우 준회원 강등이 모두 이루어지는 날부터 진행될 예정입니다. 준회원 강퇴는 약 10일에 걸쳐 진행될 예정이며 (하루에 200명 강퇴제한), 그 이후에 정회원부터 특별회원 순으로 진행 될 에정입니다. 이번 1차 물갈이로 준회원은 약 2000-3000명 강퇴처리가 될 예정이니 날짜 계산을 하시고 물갈이 대상자에 포함된 회원분들 께서는 카페 방문/ 등업신청(준회원)을 해주시길 바랍니다.\n\n\n( 준회원 물갈이는 메일이 발송 완료가 되는 순간부터 진행됩니다.)\n\n\n\n\n\n\n\n\n2차 물갈이는 2월 중으로 진행할 예정이며, 2차 물갈이에서는 최종방문일 뿐만 아니라 활동량 역시 기준에 포함될 예정이오니, 활동량이 전혀 없으신 회원분들께서는 겨울방학기간동안 카페에 들리셔서 많은 활동 부탁드립니다. 2차 물갈이에서도 역시나 강퇴 처리가 진행될 예정입니다. ( 대상자 준~정회원 )\n\n\n\n\n\n\n\n\n\n\n\n갑작스런 물갈이 소식이라 당황스러우시겠지만 카페 이전을 대신하여 결정한 리뉴얼 사항이오니 양해 부탁드리겠습니다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n★\n\n\n\n\n\n\n\n\n덧붙이는 말씀으로 1월 1일 기준으로 카페 가입자 기준 역시 달리질 예정입니다. 10대 분들께는 가입 제한이 걸릴 예정이니 회원여러분들의 주변 분들께 알려 10대 분들께서는 미리 회원가입을 해주실 것을 알려주시길 바랍니다. :)\n\n\n\n\n\n\n\n\n\n\n\n★\n\n\n\n또한 크리스마스 & 신년 이벤트는 12월 25일에서 12월 31일 사이로 예정 되어있습니다. 이번 이벤트는 길게 하는 것이 아니라 반짝 이벤트로 진행되며, 보보 외의 소정의 상품이 예정되어 있습니다. 자세한 사항은 내일 중으로 재공지 드리겠습니다.\n\n\n\n\n\n\n\n\n\n\n\n				사서함 73호, 바람이 머문 낙원\n\n				http://cafe.daum.net/ehdrudqk                 info: "윤서야 니 소설 받어.\n\n\n\n 치로_왜 유리컵에 물이따라지면 유리는 차가워질까.\n\n\n\n\n내 이름은 한유리.\n\n\n\" ㅡ 한유리 너 계속 그럴꺼야? \"\n\n\" 뭐가? \"\n\n\" 계속 그러지마 진짜로 \"\n\n\" 계속 그러지마 계속 그러지마 진짜로. 라고가 어떤걸 말하는 거야? \"\n\n\" 계속 그렇게 나온다면야... 더이상 내옆에 있지마 \"\n\n\" 음...~ 이유를 말해봐 \"\n\n\" 헤어지자 \"\n\n\" 이유를말해봐 \"\n\n\" 그만하자 제발... \"\n\n\" 이유 ~ ? \"\n\n\" 너 너무 질렸어. \"\n\n\" 마지막으로 묻는다 이유를말해봐 \"\n\n\n나의눈은 매우화가난 호랑이가 되어있었고. 이내 내 앞에서 긴머리와 큰눈, 새하얀 피부, 앵두같은입술에,키카크고 쫙 빠진몸매, 그리고 보라색 머리까지 가지고\n\n있는 나를 차고있는 이 녀석. 이름은 한룡환이요. 이제부터 필요한 존재겠지. 그래 룡환이는 나를 똑바로 바라보고 이유를 또박또박 말해준다.\n\n\n\n\" 니가. 우리 누나 못살게 굴었대며. 내가 그만하라했잖아 왜 계속했어. 그짓 계속할꺼면 나랑 헤어지자고.\n\n니가 우리 학교 일찐짱 맞고있어서 그런거알아. 당연히 그렇다는거 나도 전 학교에서 일찐짱 맞아본적있어서 알아. 근데 이건 좀 너무하잖아. \"\n\n\" 그냥 누나가 아니잖아 \"\n\n\n나는 모든걸 다 알고있다는 눈빛으로 싱긋 웃어주며 말하자 룡환이는 움찔하고 몸이 흔들리더니만 이내 다시 입을연다.\n\n\n\" 그냥 누나야 우리친누나라고 한룡완 \"\n\n\" 룡환아. 거짓말마~ 귀신은 속여도 나는 못속인다? 모든 진실을 꾀뚤고있는 일찐짱을 뭘로 보시나~ 둘이 나한테 않걸리려고\n\n연극하는거잖아. 걔 원래 이름은 홍수연 맞지? \"\n\n\n내가 점점 사악한 웃음으로 변하면서 싱긋싱긋 웃어주니 룡환이는 살짝살짝씩 몸을 덜덜 떨더니 다시 내게 말했다.\n\n\n\" 그래.... 그런거 맞는데............~ 우리 헤어지자............. 그만 우리 5년생활 정리하자 .......... \"\n\n\" 맘대로 하세요~ \"\n\n\" ..............? \"\n\n\" 뭐. 내가 울고불고 떠나지말라고 할줄알았나? 운다면 이미 다 울었어 하하. \"\n\n\" 그..근데 ... 너 왜 내가 수연이랑 사귄다는거 알면서도 않 헤어졌어? \"\n\n\" 니가 생각하는거 이상으로 난 널 사랑하고. 그렇게 쉽게 헤어질 사랑이라는걸 나는 알고있었으니까.\n\n5년..........? 그게 그냥 세월인줄아나본데~ 너무너무 소중한 거야 그 5년. 그래서 나는 안말하고있었어. \"\n\n\" ............. 미안하다...... 그래도 난 지금 너무 수연이를 조.............. \"\n\n\n\" 쉬잇! 됬으니까 그만해! 자 우리 이제 반으로 돌아가야지! \"\n\n\" 으...응 \"\n\n\n\" 아 ... 먼저 내려가있어. 나 담배 한대 피고 내려갈께 \"\n\n\n나는 계단쪽에서 그냥 여기있으라고 손짓을 미친듯이 하며 나를 불러대는 후배들을 보고 룡환이에게 먼저내려가라고했다.\n\n룡환이가 내려가자 그 후배 3명은 나에게왔고, 모든일을 일일히 캐묻기시작하였다.\n\n\n\n\" 뭐에요 누나? 이게 뭔일이에요!?!?! 둘이 헤어지다니요!!! \"\n\n\" 누나 대답좀해봐요. \"\n\n\" 아씹...... 둘이 잘지내다가 갑자기 왜 그러는데요 \"\n\n\n\" 몰라 니들이 알바냐 \"\n\n\n\n\n차가워진나. 바로 삐딱해진나다.\n\n하하. 원래부터 있던일이라 별로 상관도 쓰지 않는나와 그녀석들\n\n첫번째로 귀여운 얼굴로 눈을반짝이며 말한애는 한유신. 두번째로 차갑던성격인아이가 길게 물어본. 아이 신차원. 3번째로 욕을섥어서 말한놈 매우차가운놈. 김물이다.\n\n아.. 알아보기 힘들면. 쉽다. 유신이는 나를 누나라고 부르고, 차원이도 나를라고 부른다. 이거 알아듣기 힘들다 하는 사람들은 없을꺼다. 유신이는 명랑하고 귀여운성격\n\n이고, 차원이는 차가운성격이기때문에 알아보기가 쉽다. 그리고 물이는 선배라고 부른다.\n\n\n\" 대답좀해보세요~ 제발제바알~~~ 누나누나~~~ \"\n\n\n\" 니들이 상관할일아니라고 했다 후우~ \"\n\n\n\n답배를 입에 문체 삐딱하게 대답하는 날 보고 한숨을 푸욱푸욱 쉬는 3명\n\n\n\n\" .... 대답좀해보라고요 누나 \"\n\n\" 맞아요맞아요!!!!!!!!!!!!!!!! 차원이말이 옳아요!!!!! \"\n\n\n\" 선배 ............ 지금한말다 진짜에요? 룡환이 형이랑 우리반 수연이랑 진짜 사귀냐고요 \"\n\n\n\" 알바 없다고했다. 특히 너는 더 욱 더  \"\n\n\n\" 선배 왜 계속 저한테만 차갑게 구세요?\n\n제가 뭐 잘못한거있어요? \"\n\n\n\n\" 갈꼐 \"\n\n\n나는 옥상에서 빠져나왔고 이내"

            {
                id: "<20121003112527.HM.f0000000005GYwv@chai925.wwl1448.hanmail.net>",
                name: "예니가 할머니에게",
                x: 9,
                y: 75,
                color: "#7B4EFE",
                info: "<예니에게 >\n\n\n\n\n\n예니야. 네가 원하는 대로 명절은 그럭저럭 잘 지냈다.\n\n\n그리고 네 그림과 글도 잘 읽었다. 현재의 네 마음 상태가 잘 그려져 있더구나.\n\n\n즐거웠다가 짜증이 났다가 혼란스러웠다가....\n\n\n그것이 우리들의 마음이란다. 너만 그런 것이 아니고 사람이라면 다 그러면서 살고 있다고 봐야겠지.\n\n\n그런데 부처님은, 과거는 돌아보았자 후회와 회한 뿐이고 미래는 생각해봤자 두려움과 걱정뿐이라고 하셨다. 그러니까 2500년 전이나, 지금이나, 너나, 나나, 할 것 없이 사람은 다 그러면서 살고 있다는 것이지. 참 맞는 말이지!\n\n\n\n\n\n그런데 그 과거는 “나의 것”이 아니라고 하셨다. 그 과거는 오래 된 것일 수도 있지만 방금 전에 일어난 것일 수도 있는데 부처님은 이 과거가 그 순간의 것일 뿐 현재 나의 것이 아니라고 하셨다. 그런데 우리는 이 과거 때문에 현재를 불행하게 살고 있다. 또 미래는 아직 오지도 않았는데 미리 짐작으로 불안해하면서 살고 있다. 그래서 현재를 망치고 있다. 지나가버린 사건들이나 그 때 가졌던 마음들은 이미 내 것이 아니니까 그것을 붙잡고 연연할 필요가 없다는 것이지. 더구나 사람 일은 한치 앞도 내다볼 수 없는데 왜 미리부터 걱정하면서 마음을 쪼으면서 살아야 하느냐 라는 것이다.\n\n\n\n\n\n그래서 부처님은 “현재”를 살라고 하셨다. 한 순간 한 순간 일어나는 마음을 알아차리면서 사는 사람이 제일 행복하다고 하는데 사실 우리들은 그런 습관이 잘 안되서 여전히 과거와 미래만을 생각하면서 산단다. 현재의 마음을 볼 줄을 모르기 때문이다. 현재의 마음도 금방 한 순간에 과거의 마음이 되고 미래의 마음도 한 순간에 현재가 되면서 흐르고 있는 것이 마음의 특징이지만 우리는 그것을 모르고 있다. 그래서 지나간 과거의 마음이 현재 내 마음인 줄 알고 그것 때문에 괴로워하고 또 어떤 때는 그것 때문에 즐거워하기도 한다.\n\n\n\n\n\n예를 들면 네가 그린 그림들이 그것을 잘 표현하고 있는 셈이지. 그 때 그 마음들을 너는 그림으로 표현한 것이 아니겠니!\n\n\n그런데 부처님의 가르침대로라면 그것은 그 때 그 마음의 표현일뿐이지 현재 지금의 네 마음은 이미 다르다는 것을 너는 이미 경험으로 알고 있을 것이다. 상담 선생님들이 그림을 통해서 사람의 마음을 판단한다고 하지만 사실 그것도 이미 지나간 마음일 뿐 현재의 마음은 아니다. 그렇게 마음은 무섭도록 빠르게 흐르고 있는데 이것이 과거의 마음인지 미래의 걱정인지 분별이 안 돼서 뒤죽박죽이 되어버리지. 네 그림에서처럼 온통 뒤엉켜서 그냥 짜증만 나고 화만 나는데 그것이 왜 그런지를 우리는 모르고 산다. 그런데 가만히 마음을 가라앉혀서 지켜보면 이미 가버린 과거와 오지도 않은 미래에 대한 불안으로 마음이 불편한 때문에 그런 것이다.\n\n\n\n\n\n그럴 때 수행자들이 하는 방법은 얼른 내 마음을 알아차리는 것이다. 그래서 “응, 지금 내 마음이 뒤죽박죽이구나. 엉켜있구나” 하고 그 마음을 이해해주는 것이다. 이렇게 현재 불편한 그 마음을 어루만져주고 이해해주면 그 때의 기쁨은 엄마가 위로해주는 것보다 더 클 수가 있다. 왜냐하면 내가 나를 제일 잘 알기 때문이다. 그런데 지금까지 나를 내가 이해해주지 않고 엄마나 윤서나 다른 선생님이 이해해주고 치료해주기를 바랐으니 만족할 수가 없는 것은 당연한 일이 아니겠니?\n\n\n\n\n\n어쨌든 네 그림은 지금 많이 밝아져 있는 현재의 네 마음을 보여주어서 나는 기쁘다. 하지만 그림을 통해서 드러난 현재의 네 마음도 이미 과거의 마음이라는 것을 네가 이해할 수 있었으면 더 좋겠다. 그래서 새로 일어난 마음도 가볍게 받아들일 수 있다면 더할나위 없이 좋은 일이지.\n\n\n\n\n\n너는 앞으로 올 미래에 대한 두려움도 있을 것이다. 그 때에는 “응 내가 지금 불안해 하고 있구나. 미래를 걱정하고 있구나” 하고 현재의 그 마음을 알아차리면 이상하리만큼 마음이 편해질 것이다. 운동선수가 시합을 앞두고 있거나 연주자가 청중들 앞에 나서기 직전, 또는 면접시험을 보기 직전의 마음들과 비슷하다고 할까? 그런데 이 때에는 “내 마음이 지금 떨고 있네”, “내가 지금 일등하고 싶어하네” 하고 그 마음을 보면 마음이 편해진다. 그래서 지금 현재 하고 있는 일을 더 충실하게 하게 되는데 그 마음을 알아차리지 못하고 과거의 억울했거나 안타까웠던 마음 혹은 떨어지거나 시합에 졌을 때의 불안한 마음에 집착하고 있으면 현재에 충실할 수가 없어서 대부분 실패하게 된다.\n\n\n\n\n\n그렇다고 지금 일어나고 있는 그 불안한 마음을 억지로 누르라는 것이 아니다. 그런 마음이 있는 줄을 알아차리라는 것이다. 이것이 현재의 마음에 충실하는 방법이란다.\n\n\n\n\n\n자. 할머니가 참 긴 글도 썼구나. 그런데 사실 이런 말을 이해할 수 있는 사람은 이 세상에 몇 안되는데 왠지 너는 수준이 높아서 그 말을 알아들을 것 같다. 네가 어려서부터 그런 시련을 겪는 것을 보면서 보통사람이 가질 수 없는 지혜를 얻기 위한 과정이었다고 할머니는 자부하고 있거든. 물론 지혜가 없으면 그 시련으로 미래를 더 망칠 수 있게지. 하지만 지혜로운 사람들에게는 그 시련이 약이 되고 좋은 영양소가 되는 법이란다.\n\n\n이쁜 우리 예니, 너는 지금까지 잘 하고 있으니까 걱정하지 말고 현재의 너를 받아들이면서 하루하루를 살기 바란다. 너는 잘 될 것이다. 그것도 너무....\n\n\n\n\n\n사랑한다 우리 손녀딸!\n\n\n\n\n--------- 원본 메일 ---------\n\n\n\ "

                info: "너무 잘 했구나.\n\n\n엄마는 갖고 싶은 것 받아서 좋고. 그것도 이쁜 딸한테서 받았으니 더 행복할 것이고.\n\n\n그리구 너는 주고싶은 마음이 나서 주었으니 복을 지어서 좋고.\n\n\n모두 다 좋구나. 또 그 소식을 들은 나와 이모들두 좋고. 물론 이것을 보는 윤서도 기분 좋을 것이고...\n\n\n자, 우리 예니의 착하고 이쁜 행동 하나가 이렇게 많은 사람들을 기분 좋게 해주는구나.\n\n\n너는 어려서부터도 남을 챙기는 마음이 있어서 어른들을 깜짝놀라게 했단다.\n\n\n특히 엄마 입에 맛있는 것 넣어주고 배려하는 것이 남달랐단다.\n\n\n역시 너는 훌륭한 예니다.\n\n\n\n\n\n그것을 옛 말에는 \"하나가 청정하면(깨끗하면) 열이 청정하다\"고 한단다.\n\n\n세상은 사실 따지고 보면 착한 사람들보다도 착하지 못한 사람들이 더 많은 것 같아 보인다.\n\n\n사람의 마음이 원래 그렇게 탐욕과 성냄과 어리석음으로 꽉 차있기 때문이지.\n\n\n그런데 너의 증조할아버지는 이렇게 말씀하셨다.\n\n\n\"사람들은 대부분 다 이렇게 어리석게 살고 있는데 그래도 몇 사람이 바르게 살기 때문에\n\n\n그 힘으로 다른 사람들까지도 고생을덜 하게 해준다\"고.\n\n\n이런 사람들은 그 모습을 드러내지 않고도 편안하고 따뜻한 마음의 파장을 보내는 것만으로\n\n\n모든 사람들을 행복하게 해 주는 숨은 힘이 있다는 것이지.\n\n\n너 같은 마음이 많을수록 그 집안, 그 사회, 그 나라가 잘 살 수 있다는 의미다.\n\n\n\n\n\n우리가 잘 몰라서 그렇지 이런 훌륭한 사람들이 많단다.\n\n\n어떤 사람은 해마다 크리스마스가 되면 가난한 사람들 주라고 남 몰래 돈 자루를 맡겨놓고 도망가는 사람이 있단다.\n\n\n이런 숨은 사랑의  뉴스를 들으면 \"그래 아무리 세상이 각박해도 역시 사람 사는 사회는 좋은것이여!\"\n\n\n하면서 우리들 마음도 흐믓해지거든. 바로 이것이다. 그 사람의 행동이 많은 사람을 행복하게 해주는 것이지.\n\n\n그러면 다른 사람들의 마음도 따뜻해지면서 그 행동을 따라하게 된다.\n\n\n그러면 그 사람의 착한 마음은 한 번으로 끝나지 않고 천파 만파 세상에 퍼지는 것이다.\n\n\n그 보시 공덕도 더 많아지겠지.\n\n\n\n\n\n이런 사람들은 그 보시공덕으로\n\n\n첫째, 돈이 많이 모여서 부자가 되고\n\n\n둘째, 그 이름을 널리 떨치게 되며\n\n\n셋째, 다른 사람들에게 인기가 많고\n\n\n네째, 자기가 떳떳하니까 어떤 사람 앞에서도 당당하고\n\n\n다섯 째, 이다음에 좋은 곳(천국이나 극락)에 태어난다고 했다.\n\n\n이것은 부처님이 보장하는 말씀이다.\n\n\n\n\n\n그래서 물건으로든 마음으로든 남에게 보시하는 것, 남을 사랑하는 것이 칭찬받을만한 일이라는 것이다.\n\n\n이것은 결코 손해보는 일이 아니다.\n\n\n\n\n\n 오늘의 실천사항!\n\n\n\n\n\n이 글을 보고 있는 내 마음이\n\n\n기분이 좋으면 \"내 마음이 지금 기분 좋구나\" 알아차리기\n\n\n기분 나쁘면 \"기분 나쁘구나 \"하고  알아차리기.\n\n\n두근거리면 \"응 지금 떨고 있구나\" 알아차리기.\n\n\n불안하면 \"응 지금 마음이 불안하구나\" 알아차리기\n\n\n이것이 현재에 마음을 두는 방법이고 이렇게 자꾸하해서 편안한 마음이 유지되면 공덕을 많이 쌓는 행동을 하게 된다.\n\n\n그리구 하는 일도 잘 되고.....\n\n\n\n\n\n예니 힘내라!.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n--------- 원본 메일 ---------\n\n\n\n보낸사람: 김몽 <hariri@naver.com>\n\n받는사람 : chai <chai925@daum.net>\n\n날짜: 2012년 10월 13일 토요일, 16시 15분 22초 +0900\n\n제목: RE: RE: 너와 하현이를 생각하며 보내는 글\n\n\n\n\n으앙 자랑이라니요 헝             {

                name: "RE: 할머니^-^~~",
                x: 43,
                y: 28,
                color: "#8B5F0C",
                info: "예니야!\n\n\n그림 잘 보았다. 이건 뭐 너무 잘 그려서 입이 딱 벌어지는구나 .\n\n\n그런데 잘 그리는 것만이 아니라 그림의 형태와 인상이 썩 마음에 드는구나.\n\n\n아무리 그림이 좋아도 왠지 인상이 기분 나쁜 것도 있잖아...\n\n\n그런데 네 그림은 너처럼 예쁘구 또 주는 느낌이 평화롭고 좋다.\n\n\n네 그림을 통해서 네 마음을 볼 수 있어서 할머니 기분이 아주 좋다.\n\n\n넌 배우지도 않고 혼자 했는데도 그 정도냐?\n\n\n진짜로 타고났구나. 너희 엄마가 네 그림이 좋다고 자꾸 말하길래 예전에 내가 보던 그 정도겠지 했는데\n\n\n지금 보니 그게 아니네.\n\n\n\n\n\n네가 왜 미술 확원에 가고싶은 마음이 일어났는지 알 것 같다.\n\n\n여기서 더 배우고 발전하고 싶은 거지? 그리구 네 재능을 인정 받고 싶은 거지?\n\n\n내 생각에도 그랬으면 좋겠다. 예전에 내가 즐겨 보던 만화 중에 수누피라는 것이 있었다. 너도 기억할 것이다.\n\n\n수누피는 그냥 강아지 그림인데 내가 놀란 것은 그 강아지의 움직임 속에 사람의 동작이 완전하게 표현되고 있다는 것이야.\n\n\n그래서 나는 그 때 이 작가는 그 동안 엄청난 뎃상의 내공이 있구나 하고 생각했어. 나중에 알고 보니 그게 사실이더라.\n\n\n태고난 재능은 사실 몇%에 불과하다고 하더라. 재능+노력+운 도 따라야 겠지만 남의 눈치 보지 말고 그냥 묵묵히 자기 길만 열심히 산 사람들이\n\n\n재능도 따르고 노력은 당연히 따르며 그 노력이 운명을 만들어가는것 같더라.\n\n\n\n\n\n확원 선생님이 너랑 궁합이 맞았으면 좋겠다.\n\n\n예전에 낭 이모가 대학에 떨어지고 암담한 기분으로 미술학원에 갔을 때 생각이 난다.\n\n\n거기서 네 이모는 그 동안 주변에서 인정받지 못하던 모든 재능을 다 발휘하더니\n\n\n자심감이 생기고 대학도 붙었단다. 그것도 우수하게...\n\n\n너도 힘내기 바란다. 잘 될거다. 최면을 걸어...나 예니는 잘 될꺼야! 나는 예니를 사랑한다...\n\n\n하면서 최면을 걸자. 화이팅!!!\n\n\n\n\n\n할머니 기분이 매우 좋아졌다.\n\n\n또 그리면 보내줘.\n\n\n안녕.....\n\n\n\n\n--------- 원본 메일 ---------\n\n\n\n보낸사람: 푸몽 <hariri@naver.com>\n\n받는사람 : chai <chai925@daum.net>\n\n날짜: 2013년 5월 07일 화요일, 17시 11분 31초 +0900\n\n제목: 할머니^-^~~\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n어제그린 고양이수인 전신이에요~\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n1~2주 정도 된 그림인데 오랜만에 선화했다가 잘나와서 엄청놀랐던 그림 ._.)... 요즘 한창 유행하고있는 애니기반으로 짜본 자캐에요~\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n4월 초? 정도에 그렸던 그림이에요~ 친구 생일이여서 그려준 호러게임 주인공 이브라는 캐릭터에요\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n이건 꽤 된그림이에요 ._. 2월? 3월? 정도~ 여서 완성도는 떨어지지만 그래도 그때즈음에 유일하게 완성한그림 제 자캐에요\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n커뮤로그들! 맨 위에 빨간머리하고 맨밑에있는 노란머리가 제 자캐에요. 커뮤로그는 정말 넘쳐흐르는데 다른건 진짜 선 찍그은거밖에 못되서 ._.)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nㅎㅎ할머니 잘 계시나요? 오랜만에 메일로 인사드려요~ 다음에 또 기회되면 더 성장한그림을 보내드릴께요\n\n\n보고싶어요 할머니! ㅠㅠ 이모들한테도 안부전해주세요!"

            {
                id: "<C_M_M_I_D.11_0_25185_0_0.1433272.1436942101@nexon.co.kr>",
                name: "사이퍼즈 아이디 휴면 전환 안내",
                x: 47,
                y: 85,
                color: "#E07CE3",
                info: "사이퍼즈 고객센터\n\n\n\n\n\n\n\n			사이퍼즈 장기 미이용자 휴면 계정 전환 알림\n\n\n\n\n\n\n\n						안녕하세요. 네오플 사이퍼즈입니다.\n\n\n\n\n						고객님의 계정이 장기간 미이용으로 인해 휴면 계정으로 전환될 예정입니다.\n\n\n\n\n						네오플은 고객님의 소중한 개인 정보를 보호하기 위해, 1년 이상 로그인 및 게임과 관련된 서비스\n\n						이용 기록이 없는 경우 '휴면 계정'으로 전환하여 해당 계정의 개인 정보를 분리하여 저장하고 있습니다.\n\n\n\n\n						'휴면 계정'으로 전환된 경우, 다시 서비스를 이용하기 위해서는 휴면 계정 복귀 절차가 필요합니다.\n\n						단, 아래 전환 만료일까지 로그인 기록이 있다면 '휴면 계정'으로의 전환은 이루어지지 않습니다.\n\n						장기 미이용으로 인한 개인 정보 분리를 원하시지 않는다면 사이퍼즈 공식 홈페이지에 로그인을 부탁드립니다.\n\n\n\n\n\n\n						[휴면 계정 전환 시 분리 보관되는 개인 정보 항목]\n\n- 이름, 생년월일, 이메일, 휴대폰 번호, 본인 인증 정보, 부모 동의 관련 정보\n\n\n\n\n						[휴면 계정 전환 만료일]\n\n						- 2015년 8월 17일 (해당 기간 내에 로그인 기록이 없다면 휴면 계정으로 전환됩니다.)\n\n\n\n\n\n				※ 휴면 계정 전환이 적용되지 않은 경우에도, 1년 이상 로그인 및 게임 이용 기록이 없을 경우\n   다시 휴면 계정으로 전활 될 수 있습니다.\n\n\n				※ 휴면 계정으로 전환된 경우 개인 정보가 분리되어 보관되며 공식 홈페이지에 로그인 한 후,\n   휴면 계정 복귀 절차를 통해 다시 서비스 이용이 가능합니다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n						고객님께서 궁금하실 정보를 미리 알려드립니다.\n\n\n\n\n						1. 사이퍼즈 휴면 계정 전환 안내 메일을 왜 받은 거죠?\n\n						고객님의 개인 정보 보호를 위해 정보통신망 법 제29조에 따라 1년 이상 사이퍼즈의 서비스를 이용하지 않은 고객님은 휴면으로 전환되며 고객님의 개인 정보를 별도 분리 보관하거나 삭제하여 보호합니다.\n\n\n\n\n\n						2. 사이퍼즈 계정이 휴면 전환되면 어떻게 되나요?\n\n						휴면 상태가 되면 사이퍼즈에서는 고객님의 개인 정보를 열람/이용 할 수 없으며, 다시 서비스 이용을 원하시는 고객님께서는 언제든지 홈페이지에서 로그인 하신 후, 본인 인증을 통해 휴면을 해제하시면 서비스 이용이 가능합니다.\n\n\n\n\n						3. 사이퍼즈에 회원가입을 하지 않았는데 메일을 받았습니다.\n\n						본 메일은 사이퍼즈 회원정보에 입력된 이메일 주소로 발송된 메일입니다. 따라서 다른 사람이 이메일 주소를 잘못 입력한 경우 본 메일을 받으실 수 있으니 사이퍼즈에 가입한 적이 없으신 경우에는 고객센터로 문의해 주세요.\n\n\n\n\n\n\n						4. 내 개인 정보가 도용되어 가입된 것은 아닌지 걱정됩니다.\n\n						이 경우, 고객님께서 직접 홈페이지의 [아이디 찾기] 메뉴를 통해 고객님의 개인 정보로 가입된 사이퍼즈 계정을 확인하실 수 있으며, 고객님께서 가입하지 않은 계정 본인확인 후 바로 탈퇴하실 수 있습니다.\n\n\n\n\n\n						5. 이메일 수신거부를 했는데, 왜 메일을 받나요?\n\n						휴면 전환 안내 메일은 관련 법령에 따라 고객님의 이메일 수신 동의 여부와 관계없이 필수로 발송되는 메일입니다. 따라서 수신 거부를 하더라도 해당 메일을 수신하게 됩니다.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n			발신전용 메일입니다. 궁금한 내용은 사이퍼즈 고객센터로 문의해주세요\n\n\n\n\n\n\n\n			copyright (C) 2005 NEOPLE Co,.ltd All Rights Reserved\n\n\n			㈜네오플 대표이사 김명현 | 제주특별자치도 제주시 1100로                 info: "아까 가는데 너를 많이 못안아준것 같아서 내내 마음쓰였어.\n괜찮은지... 어떤지...\n네가 정말로 힘들텐데 왠지 못다한 말이 있는것 같기도 하고.. 아마 아쉬워서 그런것 같아.\n예니랑 몇개월 만나고 또 떨어져 있어야 하니까 이런것 같아.\n예니야\n엄마가 많이 많이 사랑하고 또 사랑하고 사랑해.\n그리고 예니가 행복하고 또 행복하기를 항상 기도해.\n너는 너무 힘든 시간을 보냈으니까 반드시 반드시 행복해질꺼야.\n우리가 그렸던 10년 뒤의 모습을 향해 너도 나도 가고 있는 중이니까\n힘내고 용기내서 예니앞에 온 것들을 잘 헤쳐나가길 바래.\n예니를 항상 응원하고 항상 네 편인 엄마가 있으니까\n든든하지? ㅋㅋ\n이쁘니\n사랑해!!\n\n엄마"

            {
                id: "<86b3d496b7fd9ca7d7aa24a548a74d8@cweb21.nm.nhnsystem.com>",
                name: "안녕 엄마",
                x: 6,
                y: 51,
                color: "#9AA5BA",
                info: "윤서가 엄청 피곤했나봐. 이모차로 집에 와서 대강 짐 풀고 미역국 좀 먹고 아래에 내려가서 빙수까지 먹고 왔어.\n그러고 방에 있는데 엄청 우는 거야! 달래는데 힘들었어. 마지막에 가인 동영상 보여주니까 뚝 그치고 집중하더라. 약도 잘 맥였고 나도 먹었어.\n지금 윤서는 자고 난 잠깐 컴퓨터 하고 있어. 처음 며칠은 힘드니까 당분간은 윤서를 너그럽게 봐주며 달래주려고.^^\n난 저번과는 다르게 이번에는 뭔가 준비 하나 없이 한국에 온 기분이야. 나도 복잡하지만 지금은 윤서가 더하겠지.\n이모 집 디게 넓고 좋아. 나랑 윤서 방도 그렇게 좁지 않고 매트리스 두개는 깔려. 서랍도 조금 있고! 책상도 두개!\n내일은 평양냉면을 먹으러 할머니랑 요이모가 서울로 내려온대. 윤서도 할머니 보고 그러면 꽤 기분이 좋아질 거 같아.\n나도 엄마하고 몇 달 만에 다시 떨어지니까 마음이 너무 아퍼. 그래두 이번에는 일년까지 떨어져 있을 일은 없으니까 그게 차라리 위로가 되는 거 같아!\n몽이에 대해서도 정말 궁금해.. 사진 많이 보내줘 ㅠㅠ\n메일이 되게 두서없다. 힘들어도 열심히 윤서 돌보며 있을게! 우리 이렇게 메일 자주해용. 전화두 자주해용.\n\n\n\n-----Original Message-----\nFrom: \"김봉이\"&lt;kya37@naver.com&gt;\nTo: \"예니\"&lt;hariri@naver.com&gt;;\nCc:\nSent: 2015-09-01 (화) 19:05:43\nSubject: 사랑하는 예니야\n\n아까 가는데 너를 많이 못안아준것 같아서 내내 마음쓰였어.\n괜찮은지... 어떤지...\n네가 정말로 힘들텐데 왠지 못다한 말이 있는것 같기도 하고.. 아마 아쉬워서 그런것 같아.\n예니랑 몇개월 만나고 또 떨어져 있어야 하니까 이런것 같아.\n예니야\n엄마가 많이 많이 사랑하고 또 사랑하고 사랑해.\n그리고 예니가 행복하고 또 행복하기를 항상 기도해.\n너는 너무 힘든 시간을 보냈으니까 반드시 반드시 행복해질꺼야.\n우리가 그렸던 10년 뒤의 모습을 향해 너도 나도 가고 있는 중이니까\n힘내고 용기내서 예니앞에 온 것들을 잘 헤쳐나가길 바래.\n예니를 항상 응원하고 항상 네 편인 엄마가 있으니까\n든든하지? ㅋㅋ\n이쁘니\n사랑해!!\n\n엄마"

            {
                id: "<5cb9baf7b562c15de9cfbf683b5c4eae@cweb06.nm.nhnsystem.com>",
                name: "안녕 예니",
                x: 38,
                y: 58,
                color: "#918915",
                info: "p{margin-top:0px;margin-bottom:0px;}﻿문자를 보긴 보았는데 내가 좀 늦게 본 것 같아.\n아직 깨어있을지도 모른다는 생각은 들지만 혹시 잠들고 있다면 깨울까봐 문자 안 보냈어.\n엄마는 오늘도 이른 아침부터 아저씨들이 복도에 왔다갔다하고 있어.\n정말 너무 불편하지만 캠핑왔다고 상상하면서(ㅎㅎ) 견디고 있어.\n이 집은 정말 빨리빨리 변해가고 있어. 우리가 살았던 곳이라고 느낄수 있는 곳은 내 방과 화장실 뿐인것 같아.\n예니방에는 너무 많은 짐이 들어있고 윤서방은 옷장을 바꾼다고 공사하고 있고 말야.\n좀 섭섭하고 고립되어있는 느낌이랄까.\n혹시 예니가 이런느낌으로 계속 살고있는 것은 아닐까하는 생각도 해봤어.\n\n오늘은 예니가 어떤일로 기분이 안 좋았는지 모르겠다.\n\n많이 답답한걸까?\n나중에 엄마 메일 보면 왜 기분이 안 좋았는지 답장해줘.\n\n보고싶고 그리운 예니~\n너무 많이 보고픈 예니야.\n엄마는 오늘도 예니윤서 생각하면서 끙하고 힘내서 일어났어.\n오늘은 뭔가 해야할게 많은 것 같은데 어쩌면 아무거도 안할지도 몰라.\n예니도 이따가 일어나서 씩씩하게 하루를 살아가기를\n너무 힘들면 좀 쉬었다가고\n힘이 있으면 씩씩하게 가고\n오늘도 우리는 죽이되든 밥이되든 한걸음!\n\n사랑해! 예니야~\n힘내!\n\n엄마"

            {
                id: "<34a2737dfa4cd5e1a0aec4cd379fe7@cweb30.nm.nhnsystem.com>",
                name: "굿모닝 예니",
                x: 28,
                y: 87,
                color: "#A8F2B1",
                info: "잘 지내고 있어 예니야?\n﻿이제 시작한 공부는 어떤지 모르겠다.\n﻿자리가 잘 안잡히지는 않니?\n﻿처음에는 자리잡기가 쉽지 않으니 좀 힘든시간을 견뎌야 할텐데 우리예니 잘 해나가고 있을까?\n﻿궁금궁금\n\n﻿엄마도 오랫동안 안하다가 다시 공부를 하려니까 집중도 안되고, 하기도 싫고 아주 죽겠다.\n﻿웹툰만 보고, 일자리 찾기만 하다가 드디어 큰 결심을 하고 공부하기로 했어.\n﻿뭐, 그래도 ㅋㅋㅋ 알지?\n﻿흠흠...\n﻿우선은 마음을 바꿨어.\n﻿이렇게 놀수있는 시간이 내 인생에 몇번 없는 시간이당\n﻿그러니 그 동안 우선은 마음 편하게 있자.\n﻿그리고 그 동안 내 앞에 하라고 놓여있는 것을 열심히 하자.\n﻿결과는 언젠가 부메랑처럼 돌아오겠지.\n\n이렇게 마음을 바꾸고 공부를 하기로 결심!\n﻿그래도 잘 안되지만 그래도 또 내가 결심한 것을 다시 기억하고 다시 결심!\n﻿책상에 앉고, 책을 펴고... 등등...\n﻿그래서 어제는 많이는 못했지만 조금은 했어.\n﻿오늘도 그렇게 해 보도록 노력은 할 예정이야.\n\n﻿혹시 예니도 나처럼 이러한가??\n﻿혹시 그대도 나처럼 이런 결심을 해보는 것은 어떤가?\n\n﻿예니는 잘 하고 있으리라 생각하지만서도\n﻿또 예니가 워밍업이 되려면 시간이 좀 걸린다는 것도 알기에\n﻿아주아주 약간은 염려하는 엄마였습니당~\n\n﻿뭔가 두서없지만 예니가 어찌지내는지 궁금하여 좀 끄적끄적해봤어.\n﻿잘 지내고~\n﻿또 연락합세.\n\n﻿오늘 좋은 하루!!!!\n﻿"

            {

                name: "예니야 안녕",
                x: 60,
                y: 69,
                color: "#68D79A",
                info: "잘 지내고 있지?\n엄마 핸드폰에 문제가 생긴것 같아. 일단 고치는데 맡겨는 볼텐데 얼마간 연락을 못할 것 같다는게 엄마 생각.\n\n토요일에는 잘 다녀왔나 몰라. 잘 했을꺼라 생각해 그치??\n돌아오는 주 부터는 학원을 가려고 마음을 먹었는데 예니가 무사히 자알 원하는 것을 이루기를 엄마가 기도하고 있을께.\n\n엄마 핸폰때문에 예니에게 힘을 주기 어려워 져서 메일로 응원하고자 하는거여.\n\n\"예니가 지금 겪는 어려움은 지난날의 어려움과는 다르다는거, 지금 겪는 것은 앞으로 나가기위한 어려움이라는거 잊지 말고..\n앞으로 나가는데는 언제나 어려움이 기다리고 있으니, 그러므로 예니는 기꺼이 어려움을 잘 겪어 나갈 것이야.\"\n화이팅! 힘 내기!!!\n\n그리고 또 하나 할 얘기가 있어.\n이건 우리 가족의 미래에 관한 얘기지.\n엄마 생각에 이제 슬슬 우리가 어디에 있을지를 결정해야 할 시간이 오고 있는 것 같아.\n물론 결정하는건 엄마니까 너무 부담 갖지는 말아.\n하지만 우리 가족이 달랑 세명인데 의견 수렴은 해야 할 것 같아서 말이야.\n우리 예니의 의견이 궁금해서 그래.\n한번 구체적으로 생각해보고 엄마한테 메일줄래?\n현실적으로, 솔직하게 말이야.\n그럼 예니 생각 윤서생각 모아서 엄마가 결정하는데 참고할께.\n그런데 이번에는 규칙이 있어. 절대로 윤서와 생각 공유하지 않기, 누군가를 설득하지 않기.\n이건 엄마가 결정자이고 책임자니까 그럴필요는 없어.\n단지 참고용이야. 그러니 규칙을 지키고~~ ㅎㅎㅎ\n메일을 주기 바란당~\n그리고 당분간은 메일로 연락을 주고 받자.\n알았지?\n\n화이팅!! 힘내고!\n우리 앞에는 앞으로도 여러가지 일들이 기다리고 있어.\n이 모든 것들을 기꺼이 감당해 내려면 많은 에너지가 필요하니\n지금 너무 많은 에너지 쓰지 말고\n예니를 아끼고~\n 사랑해~~\n\n엄마"

                info: "잘 지내고 있어?\n엄마 안 보구 싶었구?\n\n예니 소식을 이모 한테 들었어. 이번에 학원에 가지 못했다고...\n실망 많이 했을까? 혼자 많이 울었을까... 걱정된다.\n그리고 병원 다녀온 얘기도 들었어.\n예니가 많이 우울하다며, 이모도 많이 우울해 하더라.\n엄마도 예니 얘기 듣고서는 마음이 많이 슬펐었어.\n\n그런데 예니는 기억이 날지 어떨지 모르지만 예니랑 처음 뉴질랜드 왔을때가 기억났어.\n그리고 지금의 예니가 떠올랐고.\n그때의 예니는 정말 많이 아팠었는데 기억해?\n지금의 예니와 비교하면 천지 차이지.\n용된거야!!\n그래도 아직도 이렇게 아프다고 하니 그때는 정말정말 많이 아팠구나 생각되어 엄마는 마음이 더 많이 아팠어.\n음~~\n예니가 이번에 시도도 하고, 성공은 못하였지만~ 이번에는 자알 넘어졌어.\n잘 넘어질 줄 알게 되었다는것은 예니가 살아온 삶의 놀라운 성과중의 하나라고 생각해.\n잘못넘어진다는 건 무릎까지기, 머리 깨지기 등등 너무 아픈거\n잘 넘어진다는 건 엉덩방아, 팔로 짚고 넘어지기 등등 조금 덜 아픈거.\n이번에도 예니가 상처를 받았겠지만 나는 예니가 잘 넘어진 것 같아.\n잘 넘어졌다는 것은 회복하는데 시간이 덜걸린다는 것을 뜻하는 거라고 생각하고.\n그러니 너무 실망하지마.\n이번 경험을 통해서 조금 더 시간을 두고 조심 스럽게 해야겠다는 것을 알게 되었고.\n또 병원도 찾았으니 좋은 결과 인거야.\n이쁘니 너무 너무 잘 했어.\n예니를 잘 보호했고, 예니를 잘 아껴준거야.\n잘했고, 대견하고...\n이게 엄마 결론!\n\n엄마가 한국갈까 말까에 대해서는 예니 의견을 기다리기는 했는데\n아마도 예니가 거기까지 생각할 여유가 좀 없을것 같다는 생각도 들고.\n엄마는 한국에 가기로 결심을 했어.\n아직 윤서와 얘기하지는 말아. 그리고 윤서를 설득하지도 말고.\n예니 윤서가 검정고시 준비하고 시험보고\n그리고 예니는 치료받고, 윤서의 학교 문제라던가, 윤서의 치료도 생각하면 아무래도 한국이 우리에게 적합할 것 같아.\n전에 얘기했지?\n어떤 결정이든 우리 가족 모두에게 좋은 결정이 될꺼라고.\n아마도... 그럴꺼라 생각하고 슬슬 엄마는 준비해 보려구.\n최종 결정은 그래도 비행기 표 끊은 후가 되겠지만.\n예니가 생각나는거 말하고 싶은거\n어떤거가 되더라도 엄마한테 이메일 하고 싶을때는 그냥 해.\n엄마 핸폰이 당분간 좀 회복이 안될수도 있을것 같다.\nㅠㅠ\n\n예니의 소식 기다릴께.\n\n예니를 너무 사랑하는 엄마"

                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function rngFor(item, purpose) {
            const base = `${SESSION_SEED}|${purpose}|${item.id || item.name || ""}`;
            return mulberry32(hashToSeed(base));
        }

        function rectsOverlap(a, b, pad = 0) {
            return !(
                a.x + a.w + pad <= b.x ||
                b.x + b.w + pad <= a.x ||
                a.y + a.h + pad <= b.y ||
                b.y + b.h + pad <= a.y
            );
        }

        function getKeyOfEmail(email) {
            return (email.id || email.name || "").toString();
        }

        // 오른쪽 패널 영역은 텍스트 배치 금지
        function getForbiddenRect() {
            const sp = sidePanel.getBoundingClientRect();
            const w = window.innerWidth;
            const h = window.innerHeight;
            const isBottom = window.matchMedia("(max-width: 820px)").matches;

            if (isBottom) return { x: 0, y: h - sp.height, w: w, h: sp.height };
            return { x: w - sp.width, y: 0, w: sp.width, h: h };
        }

        function getUsableSize() {
            const fr = getForbiddenRect();
            const w = window.innerWidth;
            const h = window.innerHeight;
            const isBottom = window.matchMedia("(max-width: 820px)").matches;

            if (isBottom) return { w: w, h: Math.max(1, h - fr.h) };
            return { w: Math.max(1, w - fr.w), h: h };
        }

        function layoutDenseOrganic(elements, dataList, container) {
            const usable = getUsableSize();
            const containerW = usable.w;
            const containerH = usable.h;

            const placed = [];
            const MAX_TRIES = 1600;
            const PAD = 0;
            const EDGE = 8;

            elements.forEach((el, index) => {
                const w = el.offsetWidth;
                const h = el.offsetHeight;

                const item = dataList[index];
                const base = `${SESSION_SEED}|LAYOUT|${item?.id || item?.name || index}`;
                const rnd = mulberry32(hashToSeed(base));

                let best = null;

                for (let t = 0; t < MAX_TRIES; t++) {
                    const x = EDGE + rnd() * Math.max(1, containerW - w - EDGE * 2);
                    const y = EDGE + rnd() * Math.max(1, containerH - h - EDGE * 2);
                    const r = { x, y, w, h };

                    let collide = false;
                    for (const p of placed) {
                        if (rectsOverlap(r, p, PAD)) { collide = true; break; }
                    }
                    if (!collide) { best = r; break; }
                }

                if (!best) {
                    let bestScore = Infinity;
                    for (let t = 0; t < 600; t++) {
                        const x = EDGE + rnd() * Math.max(1, containerW - w - EDGE * 2);
                        const y = EDGE + rnd() * Math.max(1, containerH - h - EDGE * 2);
                        const r = { x, y, w, h };

                        let score = 0;
                        for (const p of placed) {
                            if (rectsOverlap(r, p, PAD)) score++;
                        }
                        if (score < bestScore) {
                            bestScore = score;
                            best = r;
                            if (score === 0) break;
                        }
                    }
                }

                if (best) {
                    el.style.left = `${best.x}px`;
                    el.style.top = `${best.y}px`;
                    placed.push(best);
                }
            });
        }

        // 오른쪽(3번) 출력
        function showInfoOnRightPanel(email) {
            const key = getKeyOfEmail(email);
            currentEmailKey = key;

            popupTitleEl.textContent = email.name || "(제목 없음)";

            const safe = (email.info || "")
                .replace(/\n{3,}/g, "\n\n")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            popupBodyEl.innerHTML = `<span class="label-body">본문:</span>${safe.replace(/\n/g, "<br>")}`;

            popupCheckEl.checked = selectedIds.has(key);

            // ✅ 스크롤이 "항상" 가능하도록: 내용 갱신 후 강제로 레이아웃 한번 건드림
            requestAnimationFrame(() => {
                popupBodyEl.scrollTop = 0;
            });
        }

        // 팝업 체크박스
        popupCheckEl.addEventListener("change", () => {
            if (!currentEmailKey) {
                popupCheckEl.checked = false;
                setNotice("왼쪽에서 아무거나 클릭", "error");
                return;
            }
            if (popupCheckEl.checked) selectedIds.add(currentEmailKey);
            else selectedIds.delete(currentEmailKey);

            setNotice(`과거의 수: ${selectedIds.size}개`, "info");
        });

        function getSelectedEmails() {
            const ids = new Set(selectedIds);
            return emails.filter(e => ids.has(getKeyOfEmail(e)));
        }

        function buildEmailSubject(selected) {
            const prefix = "[그 아이에게 고맙게도 맘머스가 보고 싶은 그쪽에게] ";
            const titles = selected.map(e => (e.name || "(제목 없음)").toString()).join("\n");
            return prefix + titles;
        }

        function buildEmailBody(selected) {
            return selected.map((e, i) => {
                const info = (e.info || "").toString();
                return `===== ${i + 1} / ${selected.length} =====\n${info}\n`;
            }).join("\n");
        }
        
async function sendMailAuto({ to, subject, text }) {
    await emailjs.send(
        "service_63jsa7b",
        "template_l9zx5re",
        { to_email: to, subject: subject, message: text },
        "u0GE2H0mnqCsFpmTc"
    );
}
        let els = [];

        function initElements() {
            map.querySelectorAll(".artist").forEach(n => n.remove());
            els = [];

            emails.forEach((email) => {
                const el = document.createElement("div");
                el.className = "artist";

                // 색 유지
                const r = rngFor(email, "COLOR");
                el.style.color = `#${Math.floor(r() * 0xffffff).toString(16).padStart(6, "0")}`;
                el.textContent = email.name || "(제목 없음)";

                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    document.querySelectorAll(".artist.active").forEach(a => a.classList.remove("active"));
                    el.classList.add("active");
                    showInfoOnRightPanel(email);
                });

                map.appendChild(el);
                els.push(el);
            });
        }

        function updateLayout() {
            const doLayout = () => {
                requestAnimationFrame(() => {
                    layoutDenseOrganic(els, emails, map);
                });
            };

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(doLayout).catch(doLayout);
            } else {
                doLayout();
            }
        }

        function render() {
            initElements();
            requestAnimationFrame(() => requestAnimationFrame(updateLayout));
        }

        document.addEventListener("DOMContentLoaded", () => {
            render();

            sidePanel.addEventListener("click", (e) => e.stopPropagation());

            document.addEventListener("click", () => {
                document.querySelectorAll(".artist.active").forEach(a => a.classList.remove("active"));
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    document.querySelectorAll(".artist.active").forEach(a => a.classList.remove("active"));
                }
            });

            document.getElementById("exportBtn").addEventListener("click", async (e) => {
                e.stopPropagation();

                const to = (document.getElementById("toEmail").value || "").trim();
                if (!to) {
                    setNotice("맘머스를 만날 이메일 주소를 입력하세요.", "error");
                    return;
                }

                const selected = getSelectedEmails();
                if (selected.length === 0) {
                    setNotice("아래에서 '가져가기'를 체크해주세요. ", "error");
                    return;
                }

                const subject = buildEmailSubject(selected);
                const text = buildEmailBody(selected);

                setNotice("메일 전송 중...", "info");

                try {
                    await sendMailAuto({ to, subject, text });
                    setNotice("✅ 메일 전송 완료!", "info");
                } catch (err) {
                    const http = err?.httpStatus ? `HTTP ${err.httpStatus}\n` : "";
                    setNotice(`❌ 메일 전송 실패\n${http}${err.message}`, "error");
                }
            });

            /* ===== 배경음 ===== */
            const bgm = document.getElementById("bgm");
            bgm.volume = 0.3;   // 처음엔 조용하게

            // 자동재생 시도
            bgm.play().catch(() => {
                // 막히면: 첫 사용자 상호작용에서 재생
                const unlock = () => {
                    bgm.play().catch(() => { });
                    document.removeEventListener("click", unlock);
                    document.removeEventListener("keydown", unlock);
                };
                document.addEventListener("click", unlock);
                document.addEventListener("keydown", unlock);
            });

        });

        window.addEventListener("resize", () => {
            requestAnimationFrame(() => requestAnimationFrame(updateLayout));
        });

        const ro = new ResizeObserver(() => {
            requestAnimationFrame(() => requestAnimationFrame(updateLayout));
        });
        ro.observe(map);
        ro.observe(sidePanel);
    </script>
